<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ClassChat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Familjen+Grotesk:wght@400;600;700&display=swap');
:root {
  --bg:#080910;--s1:#0f1016;--s2:#161720;--s3:#1d1e2a;
  --border:#252636;--accent:#4ade80;--accent2:#86efac;
  --text:#e4e4f0;--muted:#5a5a72;--red:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 35% at 15% 5%,rgba(74,222,128,.06) 0%,transparent 60%),radial-gradient(ellipse 35% 25% at 85% 95%,rgba(96,165,250,.04) 0%,transparent 60%);pointer-events:none;z-index:0}
.screen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;transition:opacity .28s,transform .28s}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.97)}
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:34px 30px;width:min(430px,94vw);display:flex;flex-direction:column;gap:18px;box-shadow:0 0 50px rgba(74,222,128,.04),0 24px 48px rgba(0,0,0,.45)}
.logo{font-family:'Familjen Grotesk',sans-serif;font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.logo-pulse{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 10px var(--accent);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.card-title{font-family:'Familjen Grotesk',sans-serif;font-size:28px;font-weight:700;line-height:1.15}
.card-title em{color:var(--accent);font-style:normal}
.card-sub{font-size:11px;color:var(--muted);margin-top:-10px;letter-spacing:.4px}
.lbl{font-size:10px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
input[type=text]{background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:11px 13px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,222,128,.12)}
input::placeholder{color:var(--muted);font-size:12px}
.code-inp{font-size:24px!important;letter-spacing:10px;text-align:center;text-transform:uppercase}
.btn{background:var(--accent);border:none;border-radius:8px;color:#000;cursor:pointer;font-family:'Familjen Grotesk',sans-serif;font-size:14px;font-weight:700;padding:12px;transition:opacity .18s,transform .1s,box-shadow .18s;width:100%}
.btn:hover{opacity:.88;box-shadow:0 0 22px rgba(74,222,128,.28)}
.btn:active{transform:scale(.98)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:10px}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent2);box-shadow:none}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:10px;letter-spacing:1px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.err{font-size:11px;color:var(--red);min-height:14px;opacity:0;transition:opacity .2s}
.err.show{opacity:1}
.sb-badge{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--accent2);display:flex;align-items:center;gap:6px}
/* color picker */
.color-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
.color-dot.selected{border-color:#fff;transform:scale(1.2)}
.pseudo-preview{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px}
.preview-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* chat */
.chat-wrap{width:min(580px,100vw);height:100dvh;display:flex;flex-direction:column;background:var(--s1);border-left:1px solid var(--border);border-right:1px solid var(--border);position:relative}
.chat-hdr{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:10px}
.room-badge{background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:13px;letter-spacing:3px;color:var(--accent);cursor:pointer}
.online{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.odot{width:6px;height:6px;background:var(--accent);border-radius:50%;box-shadow:0 0 6px var(--accent);animation:pulse 2s infinite}
.hdr-r{display:flex;gap:6px;align-items:center}
.ico{background:none;border:none;cursor:pointer;color:var(--muted);padding:6px;border-radius:6px;font-size:15px;transition:color .2s,background .2s;display:flex;align-items:center}
.ico:hover{color:var(--text);background:var(--s3)}
.ico.call-active{color:#4ade80;background:rgba(74,222,128,.15)}
.msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;flex-direction:column;max-width:80%;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.mine{align-self:flex-end;align-items:flex-end}
.msg.theirs{align-self:flex-start;align-items:flex-start}
.msg.system{align-self:center;max-width:100%}
.msg-meta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);margin-bottom:3px;padding:0 4px}
.msg-author{font-weight:600}
.bubble{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:8px 32px 8px 12px;font-size:13px;line-height:1.55;color:var(--text);position:relative;word-break:break-word}
.msg.mine .bubble{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.2)}
.msg.system .bubble{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 12px;border-radius:20px}
.msg-img{max-width:100%;max-height:280px;border-radius:8px;display:block;margin-top:4px;cursor:pointer;object-fit:cover}
.msg-gif{max-width:100%;max-height:240px;border-radius:8px;display:block;margin-top:4px;cursor:pointer}
/* vocal */
.voice-bubble{display:flex;align-items:center;gap:10px;padding:4px 2px;min-width:200px}
.voice-play{background:var(--accent);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:15px}
.voice-wave{flex:1;height:28px;display:flex;align-items:center;gap:2px}
.voice-bar{width:3px;border-radius:2px;background:var(--muted)}
.voice-wave.playing .voice-bar{background:var(--accent);animation:waveAnim 1s ease-in-out infinite}
.voice-bar:nth-child(1){height:5px}.voice-bar:nth-child(2){height:12px;animation-delay:.08s}.voice-bar:nth-child(3){height:20px;animation-delay:.16s}.voice-bar:nth-child(4){height:10px;animation-delay:.24s}.voice-bar:nth-child(5){height:18px;animation-delay:.32s}.voice-bar:nth-child(6){height:7px;animation-delay:.4s}.voice-bar:nth-child(7){height:15px;animation-delay:.48s}.voice-bar:nth-child(8){height:9px;animation-delay:.56s}.voice-bar:nth-child(9){height:17px;animation-delay:.64s}.voice-bar:nth-child(10){height:6px;animation-delay:.72s}
@keyframes waveAnim{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.8)}}
.voice-duration{font-size:11px;color:var(--muted);flex-shrink:0}
/* reactions */
.react-btn{position:absolute;top:50%;right:6px;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:12px;color:var(--muted);opacity:0;transition:opacity .15s;padding:2px 4px;border-radius:4px}
.bubble:hover .react-btn{opacity:1}
.picker{position:absolute;bottom:calc(100% + 6px);right:0;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:5px 7px;display:flex;gap:3px;box-shadow:0 8px 24px rgba(0,0,0,.55);z-index:20;white-space:nowrap}
.picker.hidden{display:none}
.emo{background:none;border:none;cursor:pointer;font-size:19px;padding:3px 4px;border-radius:6px;transition:transform .1s}
.emo:hover{transform:scale(1.2)}
.reactions{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.rpill{background:var(--s3);border:1px solid var(--border);border-radius:20px;padding:2px 7px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:3px;transition:all .15s;user-select:none}
.rpill.me{background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.35)}
.rcnt{font-size:10px;color:var(--muted)}
/* typing */
.typing-bar{height:26px;padding:0 18px;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);flex-shrink:0;transition:opacity .3s}
.typing-bar.empty{opacity:0}
.typing-dots{display:flex;gap:3px;align-items:center}
.typing-dots span{width:4px;height:4px;background:var(--accent);border-radius:50%;animation:tdot 1.2s ease-in-out infinite;opacity:.6}
.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.3);opacity:1}}
/* CALL UI */
.call-panel{position:absolute;inset:0;background:rgba(8,9,16,.97);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;display:none}
.call-panel.show{display:flex}
.call-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;width:100%;max-width:520px;padding:0 16px;max-height:55vh;overflow-y:auto}
.call-tile{background:var(--s2);border:1px solid var(--border);border-radius:12px;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden}
.call-tile video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:12px}
.call-tile-name{font-size:11px;color:var(--muted);z-index:1;background:rgba(0,0,0,.5);padding:2px 8px;border-radius:10px}
.call-tile-ava{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#000}
.call-controls{display:flex;gap:12px;align-items:center}
.call-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:opacity .2s,transform .1s}
.call-btn:active{transform:scale(.93)}
.call-btn.mute{background:var(--s3);border:1px solid var(--border);color:var(--text)}
.call-btn.mute.on{background:rgba(248,113,113,.2);border-color:var(--red);color:var(--red)}
.call-btn.cam{background:var(--s3);border:1px solid var(--border);color:var(--text)}
.call-btn.cam.off{background:rgba(248,113,113,.2);border-color:var(--red);color:var(--red)}
.call-btn.end{background:var(--red);color:#fff}
.call-btn.share{background:var(--s3);border:1px solid var(--border);color:var(--text)}
.call-btn.share.on{background:rgba(96,165,250,.2);border-color:#60a5fa;color:#60a5fa}
.call-info{font-size:13px;color:var(--muted);text-align:center}
.msgs.has-wallpaper{background-size:cover;background-position:center}
.msgs.has-wallpaper .bubble{background:rgba(15,16,22,.82);backdrop-filter:blur(6px)}
.msgs.has-wallpaper .msg.mine .bubble{background:rgba(74,222,128,.18);backdrop-filter:blur(6px)}
.wallpaper-panel{position:absolute;inset:0;background:var(--bg);z-index:40;display:none;flex-direction:column}
.wallpaper-panel.show{display:flex}
.wallpaper-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.wallpaper-hdr h3{font-family:"Familjen Grotesk",sans-serif;font-size:16px;font-weight:700;flex:1}
.wallpaper-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px}
.wallpaper-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 18px;overflow-y:auto}
.wp-item{border-radius:10px;aspect-ratio:9/16;cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .15s;overflow:hidden;position:relative;background-size:cover;background-position:center;display:flex;align-items:flex-end;justify-content:center}
.wp-item:hover{transform:scale(1.04);border-color:var(--accent)}
.wp-item.selected{border-color:var(--accent);box-shadow:0 0 12px rgba(74,222,128,.4)}
.wp-label{padding:5px;font-size:10px;text-align:center;background:rgba(0,0,0,.6);color:#fff;width:100%}
.wp-custom{background:var(--s2);border:2px dashed var(--border);flex-direction:column;gap:6px;font-size:20px;align-items:center;justify-content:center}
.wp-custom span{font-size:10px;color:var(--muted)}
.wp-custom:hover{border-color:var(--accent)}
.wp-none{background:var(--s2);border:2px solid var(--border);align-items:center;justify-content:center;flex-direction:column;gap:4px;font-size:22px}
.wp-none span{font-size:10px;color:var(--muted)}
.call-incoming{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--accent);border-radius:20px;padding:24px 24px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;z-index:60;box-shadow:0 8px 40px rgba(74,222,128,.15),0 8px 32px rgba(0,0,0,.6);display:none;min-width:230px}
.call-incoming.show{display:flex;animation:incomingSlide .3s ease}
@keyframes incomingSlide{from{opacity:0;transform:translateX(-50%) translateY(-12px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
.call-incoming-title{font-size:13px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.call-incoming-sub{font-size:13px;color:var(--text);font-weight:600;margin-top:-6px}
.call-incoming-btns{display:flex;gap:12px;margin-top:4px}
/* avatar avec cercles pulsants */
.call-avatar-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:80px;height:80px}
.call-avatar-wrap .ring{position:absolute;border-radius:50%;border:2px solid rgba(74,222,128,.4);animation:ringPulse 2s ease-out infinite}
.call-avatar-wrap .ring:nth-child(1){width:80px;height:80px;animation-delay:0s}
.call-avatar-wrap .ring:nth-child(2){width:80px;height:80px;animation-delay:.6s}
.call-avatar-wrap .ring:nth-child(3){width:80px;height:80px;animation-delay:1.2s}
@keyframes ringPulse{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.2);opacity:0}}
.call-avatar{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#000;position:relative;z-index:1;box-shadow:0 0 20px rgba(74,222,128,.3)}
.ci-accept{background:var(--accent);border:none;border-radius:50%;color:#000;font-size:20px;width:48px;height:48px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;box-shadow:0 0 16px rgba(74,222,128,.4)}
.ci-accept:hover{transform:scale(1.1);box-shadow:0 0 24px rgba(74,222,128,.6)}
.ci-reject{background:var(--red);border:none;border-radius:50%;color:#fff;font-size:20px;width:48px;height:48px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.ci-reject:hover{transform:scale(1.1)}
.ci-accept{background:var(--accent);border:none;border-radius:8px;color:#000;font-weight:700;font-size:13px;padding:8px 16px;cursor:pointer}
.ci-reject{background:var(--red);border:none;border-radius:8px;color:#fff;font-size:13px;padding:8px 16px;cursor:pointer}
/* input */
.inp-wrap{border-top:1px solid var(--border);flex-shrink:0;position:relative}
.rec-overlay{display:none;position:absolute;bottom:100%;left:0;right:0;background:rgba(8,9,16,.96);border-top:1px solid rgba(248,113,113,.3);padding:14px 18px;align-items:center;justify-content:space-between;gap:12px}
.rec-overlay.show{display:flex}
.rec-left{display:flex;align-items:center;gap:10px}
.rec-dot{width:10px;height:10px;background:var(--red);border-radius:50%;animation:recPulse 1s infinite}
@keyframes recPulse{0%,100%{opacity:1}50%{opacity:.3}}
.rec-time{font-size:16px;color:var(--red);font-weight:600;min-width:40px}
.rec-hint{font-size:11px;color:var(--muted)}
.rec-actions{display:flex;gap:8px}
.rec-cancel{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;padding:7px 12px;cursor:pointer}
.rec-send{background:var(--accent);border:none;border-radius:8px;color:#000;font-family:'Familjen Grotesk',sans-serif;font-size:13px;font-weight:700;padding:7px 14px;cursor:pointer}
.upload-preview{display:none;padding:8px 18px;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--s2)}
.upload-preview.show{display:flex}
.prev-item{position:relative;display:flex;align-items:center;gap:6px;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:5px 8px;max-width:200px}
.prev-item img{width:36px;height:36px;object-fit:cover;border-radius:4px;flex-shrink:0}
.prev-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;flex:1}
.prev-rm{background:none;border:none;cursor:pointer;color:var(--red);font-size:14px;padding:0 2px}
.upload-progress{height:3px;background:var(--border);display:none}
.upload-progress.show{display:block}
.progress-bar{height:100%;background:var(--accent);width:0%;transition:width .3s}
.inp-area{padding:10px 18px 13px;display:flex;gap:8px;align-items:flex-end}
.msg-inp{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 13px;outline:none;transition:border-color .2s;resize:none;max-height:100px;overflow-y:auto;line-height:1.5}
.msg-inp:focus{border-color:var(--accent)}
.attach-btn,.gif-btn{background:var(--s2);border:1px solid var(--border);border-radius:10px;cursor:pointer;color:var(--muted);padding:9px 11px;font-size:15px;transition:color .2s,border-color .2s;display:flex;align-items:center;flex-shrink:0}
.attach-btn:hover{color:var(--accent);border-color:var(--accent)}
.gif-btn{font-family:'Familjen Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px}
.gif-btn:hover,.gif-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(74,222,128,.08)}
.mic-btn{background:var(--s2);border:1px solid var(--border);border-radius:10px;cursor:pointer;color:var(--muted);padding:9px 11px;font-size:16px;transition:color .2s,border-color .2s,background .2s;display:flex;align-items:center;flex-shrink:0;user-select:none;-webkit-user-select:none;touch-action:none}
.mic-btn.holding{color:var(--red);border-color:var(--red);background:rgba(248,113,113,.15)}
.send-btn{background:var(--accent);border:none;border-radius:10px;cursor:pointer;color:#000;padding:9px 14px;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* GIF */
.gif-panel{position:absolute;bottom:100%;left:0;right:0;background:var(--s1);border-top:1px solid var(--border);height:320px;display:flex;flex-direction:column;z-index:30}
.gif-panel.hidden{display:none}
.gif-search-wrap{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center}
.gif-search{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:8px 12px;outline:none}
.gif-search:focus{border-color:var(--accent)}
.gif-search::placeholder{color:var(--muted)}
.gif-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:4px}
.gif-grid{flex:1;overflow-y:auto;padding:10px 14px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.gif-item{border-radius:8px;overflow:hidden;cursor:pointer;aspect-ratio:1;background:var(--s3)}
.gif-item img{width:100%;height:100%;object-fit:cover}
.gif-loading{grid-column:1/-1;text-align:center;color:var(--muted);font-size:12px;padding:20px}
.upanel{position:absolute;top:50px;right:0;bottom:0;width:185px;background:var(--s2);border-left:1px solid var(--border);padding:14px 12px;display:flex;flex-direction:column;gap:7px;transform:translateX(100%);transition:transform .25s;z-index:10;overflow-y:auto}
.upanel.open{transform:translateX(0)}
.ptitle{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.uitem{display:flex;align-items:center;gap:7px;font-size:12px;padding:6px 8px;border-radius:6px;background:var(--s3);border:1px solid var(--border)}
.ava{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;flex-shrink:0}
body.mini .chat-wrap{position:fixed;bottom:16px;right:16px;width:325px;height:465px;border-radius:14px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.75)}
body.mini #chatScreen{align-items:flex-end;justify-content:flex-end;background:transparent}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.lightbox.show{opacity:1;pointer-events:all}
.lightbox-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 18px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.overlay{position:fixed;inset:0;background:rgba(8,9,16,.88);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="overlay" id="overlay"><div class="spin"></div></div>
<div class="toast" id="toast"></div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">✕</button>
  <div id="lightboxContent"></div>
</div>
<input type="file" id="fileInput" style="display:none" multiple accept="image/*,video/*,.pdf,.doc,.docx,.zip,.txt" onchange="handleFiles(this.files)">

<!-- JOIN -->
<div class="screen" id="joinScreen">
  <div class="card">
    <div class="logo"><div class="logo-pulse"></div> ClassChat</div>
    <div>
      <div class="card-title">Rejoins une <em>salle</em></div>
      <div class="card-sub">// chat discret pour cours en live</div>
    </div>
    <div class="sb-badge"><span style="color:var(--accent)">●</span> Supabase connecté — temps réel</div>
    <div>
      <div class="lbl">Ton pseudo</div>
      <input type="text" id="pseudoIn" placeholder="ex: ghost99" maxlength="16" autocomplete="off" oninput="updatePreview()">
    </div>
    <div>
      <div class="lbl">Ta couleur</div>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="pseudo-preview" id="pseudoPreview">
      <div class="preview-dot" id="previewDot"></div>
      <span id="previewName" style="color:var(--muted);font-size:12px">Ton pseudo apparaîtra ici</span>
    </div>
    <div>
      <div class="lbl">Code de la salle</div>
      <input type="text" id="codeIn" class="code-inp" placeholder="XXXXX" maxlength="6" autocomplete="off" oninput="this.value=this.value.toUpperCase()">
    </div>
    <div class="err" id="joinErr"></div>
    <button class="btn" onclick="joinRoom()">→ Rejoindre</button>
    <div class="divider">ou</div>
    <button class="btn btn-ghost" onclick="createRoom()">+ Créer une salle</button>
  </div>
</div>

<!-- CHAT -->
<div class="screen hidden" id="chatScreen">
  <div class="chat-wrap">
    <div class="chat-hdr">
      <div class="hdr-l">
        <span class="room-badge" id="roomBadge" onclick="copyCode()">????</span>
        <div class="online"><div class="odot"></div><span id="onlineTxt">…</span></div>
      </div>
      <div class="hdr-r">
        <button class="ico" id="audioCallBtn" onclick="startCall(false)" title="Appel audio">🎙</button>
        <button class="ico" id="videoCallBtn" onclick="startCall(true)" title="Appel vidéo">📹</button>
        <button class="ico" onclick="openWallpaper()" title="Fond d'écran">🖼</button>
        <button class="ico" onclick="toggleMini()">⊡</button>
        <button class="ico" onclick="toggleUsers()">👥</button>
        <button class="ico" onclick="leaveRoom()">✕</button>
      </div>
    </div>
    <!-- Incoming call -->
    <div class="call-incoming" id="callIncoming">
      <div class="call-incoming-title">Appel entrant</div>
      <div class="call-avatar-wrap">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="call-avatar" id="callIncomingAvatar">?</div>
      </div>
      <div class="call-incoming-sub" id="callIncomingText">quelqu'un appelle...</div>
      <div class="call-incoming-btns">
        <button class="ci-reject" onclick="rejectCall()" title="Refuser">📵</button>
        <button class="ci-accept" onclick="acceptCall()" title="Accepter">📞</button>
      </div>
    </div>
    <!-- Call panel -->
    <div class="call-panel" id="callPanel">
      <div class="call-info" id="callInfo">Appel en cours...</div>
      <div class="call-grid" id="callGrid"></div>
      <div class="call-controls">
        <button class="call-btn mute" id="muteBtn" onclick="toggleMute()" title="Micro">🎙</button>
        <button class="call-btn cam" id="camBtn" onclick="toggleCam()" title="Caméra">📹</button>
        <button class="call-btn share" id="shareBtn" onclick="toggleScreenShare()" title="Partage écran">🖥</button>
        <button class="call-btn end" onclick="endCall()" title="Raccrocher">📵</button>
      </div>
    </div>
    <!-- Wallpaper panel -->
    <div class="wallpaper-panel" id="wallpaperPanel">
      <div class="wallpaper-hdr">
        <button class="wallpaper-close" onclick="closeWallpaper()">←</button>
        <h3>Fond d'écran</h3>
      </div>
      <div class="wallpaper-grid" id="wallpaperGrid"></div>
    </div>
    <div class="upanel" id="upanel"><div class="ptitle">Membres</div><div id="usersList"></div></div>
    <div class="msgs" id="msgs"></div>
    <div class="typing-bar empty" id="typingBar">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span id="typingNames"></span>
    </div>
    <div class="inp-wrap">
      <div class="gif-panel hidden" id="gifPanel">
        <div class="gif-search-wrap">
          <input class="gif-search" id="gifSearch" placeholder="Recherche un GIF..." oninput="searchGifs(this.value)">
          <button class="gif-close" onclick="closeGifPanel()">✕</button>
        </div>
        <div class="gif-grid" id="gifGrid"><div class="gif-loading">Tape pour chercher 🔍</div></div>
      </div>
      <div class="rec-overlay" id="recOverlay">
        <div class="rec-left"><div class="rec-dot"></div><span class="rec-time" id="recTime">0:00</span><span class="rec-hint">En cours...</span></div>
        <div class="rec-actions">
          <button class="rec-cancel" onclick="cancelRecording()">✕ Annuler</button>
          <button class="rec-send" onclick="sendRecording()">↑ Envoyer</button>
        </div>
      </div>
      <div class="upload-preview" id="uploadPreview"></div>
      <div class="upload-progress" id="uploadProgress"><div class="progress-bar" id="progressBar"></div></div>
      <div class="inp-area">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <button class="gif-btn" id="gifBtn" onclick="toggleGifPanel()">GIF</button>
        <textarea class="msg-inp" id="msgInp" placeholder="Message..." rows="1"
          oninput="autoResize(this);onTyping()"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
          onblur="stopTyping()"></textarea>
        <button class="mic-btn" id="micBtn">🎤</button>
        <button class="send-btn" onclick="sendMsg()">↑</button>
      </div>
    </div>
  </div>
</div>

<script type="module">

const SB_KEY       = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyc3hmY3F1bWFmdGp1Y3JxandqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDg3NDIsImV4cCI6MjA4ODIyNDc0Mn0.CO_x6t-VyoZ9q2lMRMI7JFuBdTZl_axGpgLcB6POFTE';
const IMGBB_KEY    = '779fcd14aaa547f3a6252af04ce8fb50';
const GIPHY_KEY    = 'OmOuCZ0qEopWbsPG3IAAHR9PcK4Y7tJv';
const CLOUD_NAME   = 'dukta92ij';
const CLOUD_PRESET = 'zidqpynw';
const LK_URL       = 'wss://classchat-qovcaguy.livekit.cloud';
const TOKEN_API    = '/api/token'; // Vercel endpoint
const EMOJIS       = ['👍','❤️','😂','😮','🔥','💀'];
const COLORS       = ['#4ade80','#f472b6','#60a5fa','#fb923c','#a78bfa','#2dd4bf','#fbbf24','#e879f9','#f43f5e','#34d399'];

const $    = id => document.getElementById(id);
const esc  = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const rnd  = a  => a[Math.floor(Math.random()*a.length)];
const fmtT = ts => new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
const fmtSz= b  => b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(0)+' KB';
const loading = v => $('overlay').classList.toggle('show',v);

window.autoResize = el => { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; };
window.toast = (msg,d=3000) => { const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d); };
const showErr = (id,msg) => { const e=$(id);e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),3500); };

// ── Color picker ──
let selectedColor = COLORS[0];
function buildColorPicker(){
  $('colorRow').innerHTML = COLORS.map((c,i)=>
    `<div class="color-dot ${i===0?'selected':''}" style="background:${c}" onclick="selectColor('${c}',this)"></div>`
  ).join('');
  updatePreview();
}
window.selectColor=(color,el)=>{
  selectedColor=color;
  document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');
  updatePreview();
};
window.updatePreview=()=>{
  const name=$('pseudoIn').value.trim()||'';
  $('previewDot').style.background=selectedColor;
  $('previewDot').style.boxShadow=`0 0 8px ${selectedColor}`;
  const nameEl=$('previewName');
  if(name){nameEl.textContent=name;nameEl.style.color=selectedColor;}
  else{nameEl.textContent='Ton pseudo apparaîtra ici';nameEl.style.color='var(--muted)';}
};

function normalize(s){ return s.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,''); }
function isSimilar(a,b){ const na=normalize(a),nb=normalize(b); return na===nb||na.includes(nb)||nb.includes(na); }
function getFileType(file){ const mime=(file.type||'').toLowerCase(),name=(file.name||'').toLowerCase(); if(mime.startsWith('image/')||/\.(jpg|jpeg|png|gif|webp|svg|bmp|heic|heif)$/.test(name))return'image'; if(mime.startsWith('video/')||/\.(mp4|mov|avi|mkv|webm|m4v)$/.test(name))return'video'; return'file'; }

async function uploadToImgbb(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=async()=>{
      try{const base64=reader.result.split(',')[1];const form=new FormData();form.append('key',IMGBB_KEY);form.append('image',base64);const res=await fetch('https://api.imgbb.com/1/upload',{method:'POST',body:form});const json=await res.json();if(!json.success)throw new Error(json.error?.message||'Erreur imgbb');resolve(json.data.url);}catch(e){reject(e);}
    };
    reader.onerror=()=>reject(new Error('Lecture échouée'));
    reader.readAsDataURL(file);
  });
}
async function uploadAudioToCloudinary(blob){
  const form=new FormData();form.append('file',blob,'vocal.webm');form.append('upload_preset',CLOUD_PRESET);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`,{method:'POST',body:form});
  if(!res.ok)throw new Error('Cloudinary '+res.status);
  const json=await res.json();if(json.error)throw new Error(json.error.message);return json.secure_url;
}

// ── CALL (LiveKit) ──
let lkRoom=null,localTracks=[],isMuted=false,isCamOff=false,callType='audio';

window.startCall=async(withVideo)=>{
  if(lkRoom){toast('Appel déjà en cours');return;}
  callType=withVideo?'video':'audio';
  toast(`📞 Lancement de l'appel ${callType}...`);
  // Notifier les autres via système message
  await SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:`📞 ${S.pseudo} a lancé un appel ${callType} — rejoins avec le bouton ${withVideo?'📹':'🎙'}`});
  await joinLiveKit(withVideo);
};

window.acceptCall=async()=>{
  $('callIncoming').classList.remove('show');
  await joinLiveKit(callType==='video');
};
window.rejectCall=()=>{$('callIncoming').classList.remove('show');toast('Appel refusé');};

async function joinLiveKit(withVideo){
  try{
    const res=await fetch(`${TOKEN_API}?room=${S.code}&username=${encodeURIComponent(S.pseudo)}`);
    const{token}=await res.json();
    lkRoom=new Room();
    setupRoomEvents();
    await lkRoom.connect(LK_URL,token);
    localTracks=await createLocalTracks({audio:true,video:withVideo});
    for(const track of localTracks)await lkRoom.localParticipant.publishTrack(track);
    showCallPanel();
    $('audioCallBtn').classList.add('call-active');
    if(withVideo)$('videoCallBtn').classList.add('call-active');
    toast('✓ Connecté à l\'appel !');
  }catch(e){toast('⚠ Erreur appel : '+e.message,4000);lkRoom=null;}
}

function setupRoomEvents(){
  lkRoom.on(RoomEvent.ParticipantConnected,p=>addCallTile(p));
  lkRoom.on(RoomEvent.ParticipantDisconnected,p=>removeCallTile(p.identity));
  lkRoom.on(RoomEvent.TrackSubscribed,(track,pub,participant)=>{
    const tile=document.querySelector(`[data-identity="${participant.identity}"]`);
    if(!tile)return;
    if(track.kind===Track.Kind.Video){const vid=track.attach();vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:12px';tile.appendChild(vid);}
  });
  lkRoom.on(RoomEvent.TrackUnsubscribed,(track)=>track.detach());
  // Add local tile
  setTimeout(()=>addLocalTile(),300);
}

function addLocalTile(){
  const grid=$('callGrid');
  const localVid=localTracks.find(t=>t.kind===Track.Kind.Video);
  const tile=document.createElement('div');
  tile.className='call-tile';tile.dataset.identity='__local__';
  const ava=document.createElement('div');ava.className='call-tile-ava';ava.style.background=S.color;ava.textContent=S.pseudo[0].toUpperCase();
  const name=document.createElement('div');name.className='call-tile-name';name.textContent='Toi';
  tile.appendChild(ava);tile.appendChild(name);
  if(localVid){const vid=localVid.attach();vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:12px';tile.appendChild(vid);}
  grid.appendChild(tile);
}

function addCallTile(participant){
  const grid=$('callGrid');
  if(grid.querySelector(`[data-identity="${participant.identity}"]`))return;
  const tile=document.createElement('div');tile.className='call-tile';tile.dataset.identity=participant.identity;
  const c=COLORS[participant.identity.charCodeAt(0)%COLORS.length];
  const ava=document.createElement('div');ava.className='call-tile-ava';ava.style.background=c;ava.textContent=participant.identity[0].toUpperCase();
  const name=document.createElement('div');name.className='call-tile-name';name.textContent=participant.identity;
  tile.appendChild(ava);tile.appendChild(name);grid.appendChild(tile);
  updateCallInfo();
}
function removeCallTile(identity){
  document.querySelector(`[data-identity="${identity}"]`)?.remove();
  updateCallInfo();
}
function updateCallInfo(){
  const count=$('callGrid').children.length;
  $('callInfo').textContent=`${count} participant${count>1?'s':''} dans l'appel`;
}

function showCallPanel(){$('callPanel').classList.add('show');updateCallInfo();}

window.toggleMute=()=>{
  isMuted=!isMuted;
  localTracks.filter(t=>t.kind===Track.Kind.Audio).forEach(t=>t.enabled=!isMuted);
  $('muteBtn').textContent=isMuted?'🔇':'🎙';
  $('muteBtn').classList.toggle('on',isMuted);
};
window.toggleCam=()=>{
  isCamOff=!isCamOff;
  localTracks.filter(t=>t.kind===Track.Kind.Video).forEach(t=>t.enabled=!isCamOff);
  $('camBtn').textContent=isCamOff?'🚫':'📹';
  $('camBtn').classList.toggle('off',isCamOff);
};
window.endCall=async()=>{
  if(screenTrack){try{screenTrack.stop();await lkRoom?.localParticipant?.unpublishTrack(screenTrack);}catch{}screenTrack=null;}
  localTracks.forEach(t=>t.stop());localTracks=[];
  await lkRoom?.disconnect();lkRoom=null;isMuted=false;isCamOff=false;
  $('callPanel').classList.remove('show');$('callGrid').innerHTML='';
  $('audioCallBtn').classList.remove('call-active');$('videoCallBtn').classList.remove('call-active');
  $('muteBtn').textContent='🎙';$('camBtn').textContent='📹';
  toast('Appel terminé');
};

// ── TYPING ──
let typingTimer=null,isTypingActive=false;
window.onTyping=async()=>{
  if(!SB||!S.code)return;
  if(!isTypingActive){isTypingActive=true;await SB.from('typing').upsert({room_code:S.code,author:S.pseudo,updated_at:new Date().toISOString()},{onConflict:'room_code,author'});}
  clearTimeout(typingTimer);typingTimer=setTimeout(()=>stopTyping(),3000);
};
window.stopTyping=async()=>{
  if(!isTypingActive||!SB||!S.code)return;
  isTypingActive=false;clearTimeout(typingTimer);
  await SB.from('typing').delete().eq('room_code',S.code).eq('author',S.pseudo);
};
function updateTypingBar(typers){
  const bar=$('typingBar'),others=typers.filter(t=>t!==S.pseudo);
  if(!others.length){bar.classList.add('empty');$('typingNames').textContent='';return;}
  bar.classList.remove('empty');
  $('typingNames').textContent=others.length===1?`${others[0]} écrit...`:others.length===2?`${others[0]} et ${others[1]} écrivent...`:`${others.length} personnes écrivent...`;
}

// ── GIPHY ──
let gifSearchTimer=null;
window.toggleGifPanel=()=>{const p=$('gifPanel'),b=$('gifBtn'),h=p.classList.contains('hidden');p.classList.toggle('hidden',!h);b.classList.toggle('active',h);if(h){$('gifSearch').focus();loadTrendingGifs();}};
window.closeGifPanel=()=>{$('gifPanel').classList.add('hidden');$('gifBtn').classList.remove('active');};
async function loadTrendingGifs(){$('gifGrid').innerHTML='<div class="gif-loading">Chargement 🔥</div>';try{const r=await fetch(`https://api.giphy.com/v1/gifs/trending?api_key=${GIPHY_KEY}&limit=18&rating=g`);renderGifs((await r.json()).data);}catch{$('gifGrid').innerHTML='<div class="gif-loading">Erreur 😕</div>';}}
window.searchGifs=q=>{clearTimeout(gifSearchTimer);if(!q.trim()){loadTrendingGifs();return;}gifSearchTimer=setTimeout(async()=>{$('gifGrid').innerHTML='<div class="gif-loading">Recherche...</div>';try{const r=await fetch(`https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_KEY}&q=${encodeURIComponent(q)}&limit=18&rating=g`);renderGifs((await r.json()).data);}catch{$('gifGrid').innerHTML='<div class="gif-loading">Erreur 😕</div>';}},400);};
function renderGifs(gifs){if(!gifs?.length){$('gifGrid').innerHTML='<div class="gif-loading">Aucun résultat 😕</div>';return;}$('gifGrid').innerHTML=gifs.map(g=>`<div class="gif-item" onclick="sendGif('${g.images.original.url}','${esc(g.title)}')"><img src="${g.images.fixed_height_small.url}" loading="lazy"></div>`).join('');}
window.sendGif=async(url,title)=>{closeGifPanel();$('gifSearch').value='';await SB.from('messages').insert({room_code:S.code,type:'media',author:S.pseudo,color:S.color,content:'',reactions:{},file_url:url,file_name:title||'GIF',file_size:0,file_type:'gif'});};

// ── VOCAL ──
let mediaRecorder=null,audioChunks=[],recInterval=null,recSeconds=0,isRecording=false;
function setupMicButton(){const btn=$('micBtn');btn.addEventListener('touchstart',e=>{e.preventDefault();startRecording();},{passive:false});btn.addEventListener('mousedown',e=>{e.preventDefault();startRecording();});}
async function startRecording(){if(isRecording)return;try{const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});isRecording=true;audioChunks=[];recSeconds=0;$('micBtn').classList.add('holding');const mimeType=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'].find(m=>MediaRecorder.isTypeSupported(m))||'';mediaRecorder=new MediaRecorder(stream,mimeType?{mimeType}:{});mediaRecorder.ondataavailable=e=>{if(e.data&&e.data.size>0)audioChunks.push(e.data);};mediaRecorder.onstop=()=>stream.getTracks().forEach(t=>t.stop());mediaRecorder.start(100);$('recOverlay').classList.add('show');recInterval=setInterval(()=>{recSeconds++;$('recTime').textContent=`${Math.floor(recSeconds/60)}:${(recSeconds%60).toString().padStart(2,'0')}`;},1000);toast('🎤 Appuie sur Envoyer quand tu as fini');}catch(e){isRecording=false;toast('⚠ Micro refusé',4000);}}
window.cancelRecording=()=>{clearInterval(recInterval);if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();mediaRecorder=null;audioChunks=[];isRecording=false;recSeconds=0;$('recOverlay').classList.remove('show');$('micBtn').classList.remove('holding');$('recTime').textContent='0:00';toast('Vocal annulé');};
window.sendRecording=async()=>{if(!mediaRecorder||!isRecording)return;clearInterval(recInterval);const duration=$('recTime').textContent;await new Promise(resolve=>{mediaRecorder.onstop=()=>{mediaRecorder.stream?.getTracks().forEach(t=>t.stop());resolve();};if(mediaRecorder.state!=='inactive')mediaRecorder.stop();else resolve();});$('recOverlay').classList.remove('show');$('micBtn').classList.remove('holding');isRecording=false;if(audioChunks.length===0||recSeconds<1){toast('⚠ Vocal trop court');return;}const blob=new Blob(audioChunks,{type:mediaRecorder.mimeType||'audio/webm'});audioChunks=[];recSeconds=0;$('recTime').textContent='0:00';toast('⏫ Envoi...',5000);try{const url=await uploadAudioToCloudinary(blob);await SB.from('messages').insert({room_code:S.code,type:'media',author:S.pseudo,color:S.color,content:'',reactions:{},file_url:url,file_name:`Vocal ${duration}`,file_size:blob.size,file_type:'audio'});toast('✓ Vocal envoyé ! 🎤');}catch(e){toast('⚠ '+e.message,5000);}};

// ── SCREEN SHARE ──
let screenTrack=null;
window.toggleScreenShare=async()=>{
  if(!lkRoom){toast('Lance un appel d'abord');return;}
  const btn=$('shareBtn');
  if(screenTrack){
    screenTrack.stop();
    await lkRoom.localParticipant.unpublishTrack(screenTrack);
    screenTrack=null;
    btn.classList.remove('on');
    btn.textContent='🖥';
    toast('Partage d'écran arrêté');
    return;
  }
  try{
    const stream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
    const{LocalVideoTrack}=await import('https://cdn.jsdelivr.net/npm/livekit-client@2/+esm');
    screenTrack=new LocalVideoTrack(stream.getVideoTracks()[0],undefined,false);
    await lkRoom.localParticipant.publishTrack(screenTrack,{source:'screen_share'});
    btn.classList.add('on');btn.textContent='⏹';
    stream.getVideoTracks()[0].onended=()=>{window.toggleScreenShare();};
    toast('✓ Partage d'écran actif !');
  }catch(e){
    if(e.name!=='NotAllowedError')toast('⚠ Erreur partage : '+e.message,4000);
  }
};

// ── WALLPAPER ──
const WALLPAPERS=[
  {id:'none',label:'Aucun',bg:'',css:''},
  {id:'dark-grid',label:'Grille',css:'repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(74,222,128,.08) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(74,222,128,.08) 40px)',bg:''},
  {id:'dots',label:'Points',css:'radial-gradient(circle,rgba(74,222,128,.15) 1px,transparent 1px)',bg:'',size:'20px 20px'},
  {id:'sunset',label:'Sunset',css:'linear-gradient(135deg,#1a0533,#3d0b6b,#7b1fa2,#e91e63,#ff6f00)'},
  {id:'ocean',label:'Océan',css:'linear-gradient(160deg,#0d1b2a,#1b4965,#2196f3,#00bcd4,#1de9b6)'},
  {id:'forest',label:'Forêt',css:'linear-gradient(160deg,#0a1628,#1b5e20,#2e7d32,#43a047,#66bb6a)'},
  {id:'night',label:'Nuit',css:'linear-gradient(135deg,#0d0d0d,#1a1a2e,#16213e,#0f3460,#533483)'},
  {id:'fire',label:'Feu',css:'linear-gradient(160deg,#1a0000,#7f0000,#d32f2f,#ff6d00,#ffd600)'},
  {id:'custom',label:'Photo…',css:'',custom:true},
];
let currentWP='none';

window.openWallpaper=()=>{
  $('wallpaperPanel').classList.add('show');
  renderWallpapers();
};
window.closeWallpaper=()=>$('wallpaperPanel').classList.remove('show');

function renderWallpapers(){
  $('wallpaperGrid').innerHTML=WALLPAPERS.map(w=>{
    const sel=w.id===currentWP?'selected':'';
    if(w.custom)return`<div class="wp-item wp-custom ${sel}" onclick="pickCustomWallpaper()"><span>📷</span><span>Photo</span></div>`;
    if(w.id==='none')return`<div class="wp-item wp-none ${sel}" onclick="applyWallpaper('none','')"><span>🚫</span><span>${w.label}</span></div>`;
    const bgStyle=w.size?`background:${w.css};background-size:${w.size}`:`background:${w.css}`;
    return`<div class="wp-item ${sel}" style="${bgStyle}" onclick="applyWallpaper('${w.id}','${w.css}','${w.size||''}')"><span class="wp-label">${w.label}</span></div>`;
  }).join('');
}

window.applyWallpaper=(id,css,size='')=>{
  currentWP=id;
  const msgs=$('msgs');
  if(!css){msgs.classList.remove('has-wallpaper');msgs.style.background='';msgs.style.backgroundSize='';}
  else{msgs.classList.add('has-wallpaper');msgs.style.background=css;if(size)msgs.style.backgroundSize=size;}
  renderWallpapers();
  closeWallpaper();
  toast('Fond appliqué ✓');
};

window.pickCustomWallpaper=()=>{
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const url=URL.createObjectURL(file);
    const msgs=$('msgs');
    msgs.classList.add('has-wallpaper');
    msgs.style.background=`url(${url})`;
    msgs.style.backgroundSize='cover';
    msgs.style.backgroundPosition='center';
    currentWP='custom';renderWallpapers();closeWallpaper();toast('Fond appliqué ✓');
  };
  inp.click();
};

// ── STATE ──
let S={pseudo:'',color:'',code:'',mini:false,sub:null,typingSub:null};
let SB=null,pendingFiles=[];

async function init(){
  loading(true);buildColorPicker();
  try{const{createClient}=await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');SB=createClient(SB_URL,SB_KEY);const{error}=await SB.from('messages').select('id').limit(1);if(error)throw new Error(error.message);loading(false);toast('✓ Connecté');}
  catch(e){loading(false);showErr('joinErr','⚠ Erreur : '+e.message);}
  $('pseudoIn').focus();setupMicButton();
}
init();

const genCode=()=>{const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:5},()=>c[Math.floor(Math.random()*c.length)]).join('');};
async function getActivePseudos(code){const{data:j}=await SB.from('messages').select('author').eq('room_code',code).eq('type','system').ilike('content','% a rejoint %');const{data:l}=await SB.from('messages').select('author').eq('room_code',code).eq('type','system').ilike('content','% a quitté %');const active=new Set((j||[]).map(r=>r.author).filter(Boolean));(l||[]).forEach(r=>active.delete(r.author));return[...active];}

window.joinRoom=async()=>{
  const pseudo=$('pseudoIn').value.trim(),code=$('codeIn').value.trim().toUpperCase();
  if(!pseudo||pseudo.length<2)return showErr('joinErr','Pseudo trop court');
  if(!code||code.length<4)return showErr('joinErr','Code trop court');
  loading(true);
  const{data,error}=await SB.from('messages').select('id').eq('room_code',code).limit(1);
  if(error){loading(false);return showErr('joinErr','Erreur : '+error.message);}
  if(!data?.length){loading(false);return showErr('joinErr','Salle introuvable');}
  const actives=await getActivePseudos(code);
  const conflict=actives.find(p=>isSimilar(pseudo,p));
  loading(false);if(conflict)return showErr('joinErr',`Pseudo similaire à "${conflict}" déjà pris`);
  enter(pseudo,code,selectedColor);
};
window.createRoom=async()=>{
  const pseudo=$('pseudoIn').value.trim();
  if(!pseudo||pseudo.length<2)return showErr('joinErr','Entre ton pseudo d\'abord');
  const code=genCode();loading(true);
  const{error}=await SB.from('messages').insert({room_code:code,type:'system',content:`Salle créée par ${pseudo}`});
  loading(false);if(error)return showErr('joinErr','Erreur : '+error.message);
  enter(pseudo,code,selectedColor);toast(`Salle créée : ${code} 🎉`);
};

async function enter(pseudo,code,color){
  S.pseudo=pseudo;S.code=code;S.color=color;
  $('roomBadge').textContent=code;
  $('joinScreen').classList.add('hidden');$('chatScreen').classList.remove('hidden');$('msgInp').focus();
  await SB.from('messages').insert({room_code:code,type:'system',author:pseudo,content:`${pseudo} a rejoint la salle`});
  const{data}=await SB.from('messages').select('*').eq('room_code',code).order('created_at',{ascending:true});
  renderMsgs(data||[]);refreshOnline();

  S.sub=SB.channel('room-'+code)
    .on('postgres_changes',{event:'*',schema:'public',table:'messages',filter:`room_code=eq.${code}`},p=>{
      if(p.eventType==='INSERT'){
        appendMsg(p.new);refreshOnline();
        // Détecter appel entrant
        if(p.new.type==='system'&&p.new.author!==S.pseudo&&p.new.content?.includes('a lancé un appel')){
          callType=p.new.content.includes('vidéo')?'video':'audio';
          const caller=p.new.author;
          const callerColor=COLORS[caller.charCodeAt(0)%COLORS.length];
          $('callIncomingText').textContent=`${caller} • appel ${callType}`;
          const ava=$('callIncomingAvatar');
          ava.textContent=caller[0].toUpperCase();
          ava.style.background=callerColor;
          ava.style.boxShadow=`0 0 20px ${callerColor}55`;
          // couleur des rings selon couleur de l'appelant
          document.querySelectorAll('.call-avatar-wrap .ring').forEach(r=>r.style.borderColor=callerColor+'66');
          $('callIncoming').classList.add('show');
          setTimeout(()=>$('callIncoming').classList.remove('show'),20000);
        }
      }
      if(p.eventType==='UPDATE')updateReactions(p.new);
    }).subscribe();

  S.typingSub=SB.channel('typing-'+code)
    .on('postgres_changes',{event:'*',schema:'public',table:'typing',filter:`room_code=eq.${code}`},async()=>{
      const{data}=await SB.from('typing').select('author').eq('room_code',code);
      updateTypingBar((data||[]).map(r=>r.author));
    }).subscribe();

  setInterval(async()=>{const cutoff=new Date(Date.now()-5000).toISOString();await SB.from('typing').delete().eq('room_code',code).lt('updated_at',cutoff);},3000);
}

async function refreshOnline(){const a=await getActivePseudos(S.code);$('onlineTxt').textContent=`${a.length||1} en ligne`;renderUsers(a.map(n=>({name:n,color:COLORS[n.charCodeAt(0)%COLORS.length]})));}

window.handleFiles=files=>{for(const f of files){if(f.size>32*1024*1024){toast('⚠ Max 32MB');continue;}const type=getFileType(f);pendingFiles.push({file:f,previewUrl:type==='image'?URL.createObjectURL(f):null,type});}renderPreviews();$('fileInput').value='';};
function renderPreviews(){const w=$('uploadPreview');if(!pendingFiles.length){w.classList.remove('show');return;}w.classList.add('show');w.innerHTML=pendingFiles.map((p,i)=>`<div class="prev-item">${p.previewUrl?`<img src="${p.previewUrl}">`:p.type==='video'?`<span style="font-size:20px">🎬</span>`:`<span style="font-size:20px">📄</span>`}<span class="prev-name">${esc(p.file.name)}</span><button class="prev-rm" onclick="removeFile(${i})">✕</button></div>`).join('');}
window.removeFile=i=>{pendingFiles.splice(i,1);renderPreviews();};

window.sendMsg=async()=>{
  const inp=$('msgInp'),text=inp.value.trim();if(!text&&!pendingFiles.length)return;
  inp.value='';inp.style.height='auto';stopTyping();
  if(pendingFiles.length){
    const toUp=[...pendingFiles];pendingFiles=[];renderPreviews();$('uploadProgress').classList.add('show');
    for(let i=0;i<toUp.length;i++){const{file,type}=toUp[i];$('progressBar').style.width=Math.round(((i+.5)/toUp.length)*90)+'%';toast('⏫ Envoi...');try{let url='';if(type==='image')url=await uploadToImgbb(file);else{const ext=file.name.split('.').pop()||'bin',path=`${S.code}/${Date.now()}.${ext}`;const r=await fetch(`${SB_URL}/storage/v1/object/chat-files/${path}`,{method:'POST',headers:{'Authorization':`Bearer ${SB_KEY}`,'Content-Type':file.type||'application/octet-stream','x-upsert':'true'},body:file});if(!r.ok)throw new Error(await r.text());url=`${SB_URL}/storage/v1/object/public/chat-files/${path}`;}await SB.from('messages').insert({room_code:S.code,type:'media',author:S.pseudo,color:S.color,content:(i===toUp.length-1&&text)?text:'',reactions:{},file_url:url,file_name:file.name,file_size:file.size,file_type:type});toast('✓ Envoyé!');}catch(e){toast('⚠ '+e.message,4000);}}
    $('progressBar').style.width='100%';setTimeout(()=>{$('uploadProgress').classList.remove('show');$('progressBar').style.width='0%';},500);
  }else{await SB.from('messages').insert({room_code:S.code,type:'msg',author:S.pseudo,color:S.color,content:text,reactions:{}});}
};

window.togglePicker=(id,e)=>{e.stopPropagation();document.querySelectorAll('.picker').forEach(p=>{if(p.dataset.id!==String(id))p.classList.add('hidden')});document.querySelector(`.picker[data-id="${id}"]`)?.classList.toggle('hidden');};
window.addReaction=async(id,emoji,e)=>{e.stopPropagation();document.querySelectorAll('.picker').forEach(p=>p.classList.add('hidden'));const{data}=await SB.from('messages').select('reactions').eq('id',id).single();const r=data?.reactions||{};if(!r[emoji])r[emoji]=[];const idx=r[emoji].indexOf(S.pseudo);if(idx>-1)r[emoji].splice(idx,1);else r[emoji].push(S.pseudo);await SB.from('messages').update({reactions:r}).eq('id',id);};

window.leaveRoom=async()=>{
  await stopTyping();await endCall();
  await SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:`${S.pseudo} a quitté la salle`});
  if(S.sub)SB.removeChannel(S.sub);if(S.typingSub)SB.removeChannel(S.typingSub);
  S={pseudo:'',color:'',code:'',mini:false,sub:null,typingSub:null};pendingFiles=[];
  $('chatScreen').classList.add('hidden');$('joinScreen').classList.remove('hidden');$('codeIn').value='';$('msgs').innerHTML='';$('typingBar').classList.add('empty');document.body.classList.remove('mini');
};

window.openLightbox=(url,isVid)=>{$('lightboxContent').innerHTML=isVid?`<video src="${url}" controls autoplay style="max-width:90vw;max-height:90vh;border-radius:8px"></video>`:`<img src="${url}" style="max-width:90vw;max-height:90vh;border-radius:8px">`;$('lightbox').classList.add('show');};
window.closeLightbox=()=>$('lightbox').classList.remove('show');

let currentAudio=null;
window.playAudio=(btn,url)=>{if(currentAudio&&!currentAudio.paused){currentAudio.pause();document.querySelectorAll('.voice-wave').forEach(w=>w.classList.remove('playing'));document.querySelectorAll('.voice-play').forEach(b=>b.textContent='▶');if(currentAudio._url===url){currentAudio=null;return;}}const audio=new Audio(url);audio._url=url;currentAudio=audio;btn.textContent='⏸';btn.closest('.voice-bubble').querySelector('.voice-wave').classList.add('playing');audio.play().catch(()=>toast('⚠ Lecture impossible'));audio.onended=()=>{btn.textContent='▶';btn.closest('.voice-bubble')?.querySelector('.voice-wave')?.classList.remove('playing');currentAudio=null;};audio.onerror=()=>{btn.textContent='▶';toast('⚠ Erreur lecture');};};

function renderMsgs(msgs){const c=$('msgs');c.innerHTML=msgs.map(buildHTML).join('');c.scrollTop=c.scrollHeight;}
function appendMsg(m){const c=$('msgs');const ab=c.scrollHeight-c.scrollTop-c.clientHeight<80;c.insertAdjacentHTML('beforeend',buildHTML(m));if(ab)c.scrollTop=c.scrollHeight;}
function updateReactions(m){const el=document.querySelector(`[data-msgid="${m.id}"]`);if(!el)return;const old=el.querySelector('.reactions');const html=buildReactionsHTML(m);if(old)old.outerHTML=html||'<span></span>';else if(html)el.insertAdjacentHTML('beforeend',html);}

function buildHTML(m){
  if(m.type==='system')return`<div class="msg system"><div class="bubble">${esc(m.content)}</div></div>`;
  const mine=m.author===S.pseudo,time=fmtT(m.created_at||Date.now()),color=m.color||COLORS[0];
  let media='';
  if(m.file_url){const ft=m.file_type||'file';if(ft==='audio'){const dur=m.file_name?.replace('Vocal ','')||'';media=`<div class="voice-bubble"><button class="voice-play" onclick="playAudio(this,'${m.file_url}')">▶</button><div class="voice-wave"><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span></div><span class="voice-duration">${dur}</span></div>`;}else if(ft==='gif')media=`<img class="msg-gif" src="${m.file_url}" onclick="openLightbox('${m.file_url}',false)">`;else if(ft==='image')media=`<img class="msg-img" src="${m.file_url}" loading="lazy" onclick="openLightbox('${m.file_url}',false)" onerror="this.outerHTML='<a href=\\'${m.file_url}\\' target=\\'_blank\\' style=\\'color:var(--accent)\\'>🖼 Voir</a>'">`;else if(ft==='video')media=`<video style="max-width:100%;max-height:240px;border-radius:8px;display:block;margin-top:4px" src="${m.file_url}" controls preload="metadata"></video>`;else{const icon=m.file_name?.endsWith('.pdf')?'📄':m.file_name?.endsWith('.zip')?'🗜️':'📎';media=`<a class="file-attach" href="${m.file_url}" target="_blank" style="display:flex;align-items:center;gap:8px;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-top:4px;text-decoration:none;color:var(--text)"><span style="font-size:22px">${icon}</span><div style="display:flex;flex-direction:column;gap:2px;overflow:hidden"><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px">${esc(m.file_name||'fichier')}</span>${m.file_size?`<span style="font-size:10px;color:var(--muted)">${fmtSz(m.file_size)}</span>`:''}</div></a>`;}}
  const picker=`<div class="picker hidden" data-id="${m.id}">${EMOJIS.map(e=>`<button class="emo" onclick="addReaction('${m.id}','${e}',event)">${e}</button>`).join('')}</div>`;
  return`<div class="msg ${mine?'mine':'theirs'}" data-msgid="${m.id}"><div class="msg-meta">${!mine?`<span class="msg-author" style="color:${color}">${esc(m.author)}</span>`:''}<span>${time}</span></div><div class="bubble">${media}${m.content?`<span>${esc(m.content)}</span>`:''}<button class="react-btn" onclick="togglePicker('${m.id}',event)">＋</button>${picker}</div>${buildReactionsHTML(m)}</div>`;
}
function buildReactionsHTML(m){if(!m.reactions)return'';const pills=Object.entries(m.reactions).filter(([,u])=>u?.length).map(([e,u])=>`<span class="rpill ${u.includes(S.pseudo)?'me':''}" onclick="addReaction('${m.id}','${e}',event)">${e}<span class="rcnt">${u.length}</span></span>`).join('');return pills?`<div class="reactions">${pills}</div>`:'';}
function renderUsers(u){$('usersList').innerHTML=u.map(u=>`<div class="uitem"><div class="ava" style="background:${u.color}">${u.name[0].toUpperCase()}</div><span>${esc(u.name)}</span></div>`).join('');}

window.copyCode=()=>navigator.clipboard.writeText(S.code).then(()=>toast('Code copié 📋'));
window.toggleMini=()=>{S.mini=!S.mini;document.body.classList.toggle('mini',S.mini)};
window.toggleUsers=()=>$('upanel').classList.toggle('open');
document.addEventListener('click',e=>{document.querySelectorAll('.picker').forEach(p=>p.classList.add('hidden'));if(!$('gifPanel').contains(e.target)&&e.target!==$('gifBtn'))closeGifPanel();});
window.addEventListener('beforeunload',()=>stopTyping());
</script>
