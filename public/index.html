<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ClassChat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Familjen+Grotesk:wght@400;600;700&display=swap');
:root{--bg:#080910;--s1:#0f1016;--s2:#161720;--s3:#1d1e2a;--border:#252636;--accent:#4ade80;--accent2:#86efac;--text:#e4e4f0;--muted:#5a5a72;--red:#f87171;--blue:#60a5fa;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 35% at 15% 5%,rgba(74,222,128,.06) 0%,transparent 60%);pointer-events:none;z-index:0}
body.theme-red{--accent:#f87171;--accent2:#fca5a5}
body.theme-blue{--accent:#60a5fa;--accent2:#93c5fd}
body.theme-violet{--accent:#a78bfa;--accent2:#c4b5fd}
body.theme-orange{--accent:#fb923c;--accent2:#fdba74}
body.theme-pink{--accent:#f472b6;--accent2:#f9a8d4}
body.theme-cyan{--accent:#2dd4bf;--accent2:#5eead4}
.screen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;transition:opacity .28s,transform .28s}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.97)}
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:34px 30px;width:min(430px,94vw);display:flex;flex-direction:column;gap:18px;box-shadow:0 24px 48px rgba(0,0,0,.45)}
.logo{font-family:'Familjen Grotesk',sans-serif;font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.logo-pulse{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 10px var(--accent);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.card-title{font-family:'Familjen Grotesk',sans-serif;font-size:28px;font-weight:700;line-height:1.15}
.card-title em{color:var(--accent);font-style:normal}
.card-sub{font-size:11px;color:var(--muted);margin-top:-10px}
.lbl{font-size:10px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
input[type=text]{background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:11px 13px;outline:none;transition:border-color .2s;width:100%}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted);font-size:12px}
.code-inp{font-size:24px!important;letter-spacing:10px;text-align:center;text-transform:uppercase}
.btn{background:var(--accent);border:none;border-radius:8px;color:#000;cursor:pointer;font-family:'Familjen Grotesk',sans-serif;font-size:14px;font-weight:700;padding:12px;width:100%;transition:opacity .18s}
.btn:hover{opacity:.88}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:10px}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent2)}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:10px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.err{font-size:11px;color:var(--red);min-height:14px;opacity:0;transition:opacity .2s}
.err.show{opacity:1}
.sb-badge{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--accent2);display:flex;align-items:center;gap:6px}
.chat-wrap{width:min(580px,100vw);height:100dvh;display:flex;flex-direction:column;background:var(--s1);border-left:1px solid var(--border);border-right:1px solid var(--border);position:relative}
.chat-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:6px}
.hdr-l{display:flex;align-items:center;gap:8px;min-width:0}
.room-badge{background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:13px;letter-spacing:3px;color:var(--accent);cursor:pointer;flex-shrink:0}
.status-badge{font-size:11px;padding:3px 8px;border-radius:10px;background:var(--s3);border:1px solid var(--border);cursor:pointer;color:var(--muted);white-space:nowrap}
.status-badge:hover{border-color:var(--accent);color:var(--text)}
.online{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);white-space:nowrap}
.odot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
.hdr-r{display:flex;gap:4px;align-items:center;flex-shrink:0}
.ico{background:none;border:none;cursor:pointer;color:var(--muted);padding:5px;border-radius:6px;font-size:14px;transition:color .2s;display:flex;align-items:center}
.ico:hover{color:var(--text);background:var(--s3)}
.ico.call-active{color:var(--accent);background:rgba(74,222,128,.15)}
.msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;flex-direction:column;max-width:80%;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.mine{align-self:flex-end;align-items:flex-end}
.msg.theirs{align-self:flex-start;align-items:flex-start}
.msg.system{align-self:center;max-width:100%}
.msg-meta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);margin-bottom:3px;padding:0 4px}
.msg-edited{font-size:9px;color:var(--muted);opacity:.7}
.bubble{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;font-size:13px;line-height:1.55;color:var(--text);position:relative;word-break:break-word}
.msg.mine .bubble{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.2)}
.msg.system .bubble{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 12px;border-radius:20px}
.bubble:hover .bubble-actions{opacity:1}
.bubble-actions{position:absolute;top:-22px;right:0;display:flex;gap:2px;opacity:0;transition:opacity .15s;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:2px 4px}
.bact{background:none;border:none;cursor:pointer;font-size:11px;color:var(--muted);padding:2px 5px;border-radius:4px}
.bact:hover{background:var(--s3);color:var(--text)}
.picker{position:absolute;bottom:calc(100% + 6px);right:0;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:5px 7px;display:flex;gap:3px;box-shadow:0 8px 24px rgba(0,0,0,.55);z-index:20;white-space:nowrap}
.picker.hidden{display:none}
.emo{background:none;border:none;cursor:pointer;font-size:19px;padding:3px 4px;border-radius:6px;transition:transform .1s}
.emo:hover{transform:scale(1.2)}
.reactions{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.rpill{background:var(--s3);border:1px solid var(--border);border-radius:20px;padding:2px 7px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:3px}
.rpill.me{background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.35)}
.rcnt{font-size:10px;color:var(--muted)}
.msg-reply-ctx{background:var(--s3);border-left:3px solid var(--accent);padding:4px 10px;border-radius:0 6px 6px 0;font-size:11px;color:var(--muted);margin-bottom:5px;cursor:pointer}
.msg-reply-ctx strong{color:var(--text);display:block}
.mention{color:var(--accent);font-weight:600;background:rgba(74,222,128,.1);border-radius:4px;padding:0 3px}
.typing-bar{height:26px;padding:0 18px;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);flex-shrink:0;transition:opacity .3s}
.typing-bar.empty{opacity:0}
.typing-dots span{width:4px;height:4px;background:var(--accent);border-radius:50%;animation:tdot 1.2s infinite;display:inline-block;margin:0 1px}
.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.3);opacity:1}}
.panel{position:absolute;inset:0;background:var(--bg);z-index:40;display:none;flex-direction:column}
.panel.show{display:flex}
.panel-hdr{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.panel-hdr h3{font-family:'Familjen Grotesk',sans-serif;font-size:16px;font-weight:700;flex:1}
.panel-back{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px}
.panel-body{padding:20px 18px;display:flex;flex-direction:column;gap:14px;flex:1;overflow-y:auto}
.g-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px}
.g-title{font-family:'Familjen Grotesk',sans-serif;font-size:14px;font-weight:700}
.g-sub{font-size:11px;color:var(--muted);line-height:1.5}
.g-select,.g-input{background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 12px;outline:none;width:100%}
.g-select:focus,.g-input:focus{border-color:var(--accent)}
.g-btn{background:var(--accent);border:none;border-radius:8px;color:#000;font-family:'Familjen Grotesk',sans-serif;font-size:13px;font-weight:700;padding:10px;cursor:pointer;width:100%}
.g-btn.red{background:var(--red);color:#fff}
.g-btn.blue{background:var(--blue);color:#000}
.g-btn.ghost{background:none;border:1px solid var(--border);color:var(--muted)}
.g-status{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--muted);text-align:center;line-height:1.6}
.g-img{width:100%;border-radius:10px;max-height:180px;object-fit:cover;border:1px solid var(--border)}
.g-phase{font-size:11px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.g-turn{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);border-radius:8px;padding:10px 14px;font-size:12px;text-align:center}
.g-player{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px}
.g-vote-btn{background:var(--red);border:none;border-radius:6px;color:#fff;font-size:11px;padding:4px 10px;cursor:pointer}
.g-vote-btn:disabled{opacity:.4;cursor:default}
.reveal-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:10px;padding:14px;text-align:center}
/* wallpaper */
.wp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 18px;overflow-y:auto}
.wp-item{border-radius:10px;aspect-ratio:9/16;cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .15s;display:flex;align-items:flex-end;justify-content:center;background-size:cover;background-position:center}
.wp-item:hover{transform:scale(1.04);border-color:var(--accent)}
.wp-item.sel{border-color:var(--accent);box-shadow:0 0 12px rgba(74,222,128,.4)}
.wp-lbl{font-size:10px;text-align:center;background:rgba(0,0,0,.6);color:#fff;width:100%;padding:5px;border-radius:0 0 8px 8px}
.msgs.has-wp{background-size:cover;background-position:center}
.msgs.has-wp .bubble{background:rgba(15,16,22,.82);backdrop-filter:blur(6px)}
.msgs.has-wp .msg.mine .bubble{background:rgba(74,222,128,.18);backdrop-filter:blur(6px)}
/* theme grid */
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:20px 18px}
.theme-item{border-radius:12px;padding:14px 10px;cursor:pointer;border:2px solid transparent;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px;background:var(--s2)}
.theme-item:hover{border-color:var(--border);transform:scale(1.04)}
.theme-item.sel{border-color:#fff}
.theme-dot{width:30px;height:30px;border-radius:50%}
.theme-name{font-size:11px;font-weight:600}
/* status modal */
.modal-bg{position:fixed;inset:0;background:rgba(8,9,16,.85);display:flex;align-items:center;justify-content:center;z-index:80;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:24px;width:min(340px,92vw);display:flex;flex-direction:column;gap:14px}
.modal-title{font-family:'Familjen Grotesk',sans-serif;font-size:16px;font-weight:700}
.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.status-opt{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 6px;cursor:pointer;text-align:center;font-size:13px;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.status-opt:hover,.status-opt.sel{border-color:var(--accent);background:rgba(74,222,128,.08)}
.status-opt span{font-size:10px;color:var(--muted)}
/* mention popup */
.mention-popup{position:absolute;bottom:calc(100% + 4px);left:18px;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:6px;display:none;flex-direction:column;gap:2px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:50;min-width:160px}
.mention-popup.show{display:flex}
.mention-item{padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;transition:background .15s}
.mention-item:hover,.mention-item.active{background:var(--s3)}
.mention-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* draw panel */
.draw-canvas-wrap{flex:1;background:var(--s2);margin:10px 12px 0;border-radius:10px;border:1px solid var(--border);overflow:hidden;position:relative;min-height:200px}
.draw-canvas{display:block;width:100%;height:100%;cursor:crosshair;touch-action:none}
.draw-tools{padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.draw-color{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.draw-color.sel{border-color:#fff;transform:scale(1.2)}
.draw-size{width:60px;cursor:pointer;accent-color:var(--accent)}
.draw-clr{background:var(--s3);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:11px;padding:5px 10px;cursor:pointer}
.draw-word{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);border-radius:8px;padding:6px 14px;font-size:13px;color:var(--accent);font-weight:600;text-align:center;letter-spacing:2px;margin:8px 12px 0;flex-shrink:0}
.draw-guesses{overflow-y:auto;padding:6px 12px;display:flex;flex-direction:column;gap:3px;max-height:90px;flex-shrink:0}
.draw-guess-msg{font-size:12px;padding:3px 8px;border-radius:6px;background:var(--s2)}
.draw-guess-msg.correct{background:rgba(74,222,128,.15);color:var(--accent);font-weight:600}
.draw-guess-row{display:flex;gap:8px;padding:8px 12px;border-top:1px solid var(--border);flex-shrink:0}
.draw-guess-inp{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:8px 12px;outline:none}
.draw-guess-inp:focus{border-color:var(--accent)}
.draw-timer{font-size:13px;color:var(--accent);font-weight:700}
/* call */
.call-panel{position:absolute;inset:0;background:rgba(8,9,16,.97);z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:20px;display:none}
.call-panel.show{display:flex}
.call-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;width:100%;max-width:520px;padding:0 16px;max-height:55vh;overflow-y:auto}
.call-tile{background:var(--s2);border:1px solid var(--border);border-radius:12px;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden}
.call-tile video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.call-tile-name{font-size:11px;color:var(--muted);z-index:1;background:rgba(0,0,0,.5);padding:2px 8px;border-radius:10px}
.call-tile-ava{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#000}
.call-controls{display:flex;gap:12px}
.call-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px}
.call-btn.mute,.call-btn.cam,.call-btn.share{background:var(--s3);border:1px solid var(--border);color:var(--text)}
.call-btn.mute.on,.call-btn.cam.off{background:rgba(248,113,113,.2);border-color:var(--red);color:var(--red)}
.call-btn.share.on{background:rgba(96,165,250,.2);border-color:var(--blue);color:var(--blue)}
.call-btn.end{background:var(--red);color:#fff}
.call-info{font-size:13px;color:var(--muted)}
.call-incoming{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--accent);border-radius:20px;padding:24px 24px 20px;flex-direction:column;align-items:center;gap:14px;z-index:60;box-shadow:0 8px 40px rgba(74,222,128,.15);display:none;min-width:230px}
.call-incoming.show{display:flex;animation:inSlide .3s ease}
@keyframes inSlide{from{opacity:0;transform:translateX(-50%) translateY(-12px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
.call-incoming-title{font-size:13px;color:var(--muted);text-transform:uppercase}
.call-incoming-sub{font-size:13px;color:var(--text);font-weight:600;margin-top:-6px}
.call-avatar-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:80px;height:80px}
.ring{position:absolute;border-radius:50%;border:2px solid rgba(74,222,128,.4);width:80px;height:80px;animation:ringP 2s ease-out infinite}
.ring:nth-child(2){animation-delay:.6s}.ring:nth-child(3){animation-delay:1.2s}
@keyframes ringP{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.2);opacity:0}}
.call-avatar{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#000;position:relative;z-index:1}
.ci-accept{background:var(--accent);border:none;border-radius:50%;color:#000;font-size:20px;width:48px;height:48px;cursor:pointer}
.ci-reject{background:var(--red);border:none;border-radius:50%;color:#fff;font-size:20px;width:48px;height:48px;cursor:pointer}
.call-incoming-btns{display:flex;gap:12px;margin-top:4px}
/* upanel */
.upanel{position:absolute;top:50px;right:0;bottom:0;width:185px;background:var(--s2);border-left:1px solid var(--border);padding:14px 12px;display:flex;flex-direction:column;gap:7px;transform:translateX(100%);transition:transform .25s;z-index:10;overflow-y:auto}
.upanel.open{transform:translateX(0)}
.ptitle{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.uitem{display:flex;align-items:center;gap:7px;font-size:12px;padding:6px 8px;border-radius:6px;background:var(--s3);border:1px solid var(--border)}
.ava{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;flex-shrink:0}
/* inp */
.inp-wrap{border-top:1px solid var(--border);flex-shrink:0;position:relative}
.reply-bar{display:none;padding:8px 18px;background:var(--s2);border-top:1px solid var(--border);align-items:center;gap:10px}
.reply-bar.show{display:flex}
.reply-preview{flex:1;border-left:3px solid var(--accent);padding:4px 10px;font-size:11px;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;background:var(--s3);border-radius:0 4px 4px 0}
.reply-preview strong{color:var(--text);display:block}
.reply-cancel{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px}
.edit-bar{display:none;padding:8px 18px;background:rgba(251,191,36,.05);border-top:1px solid rgba(251,191,36,.2);align-items:center;gap:8px}
.edit-bar.show{display:flex}
.edit-inp{flex:1;background:var(--s2);border:1px solid rgba(251,191,36,.4);border-radius:8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:8px 12px;outline:none}
.edit-save{background:#fbbf24;border:none;border-radius:8px;color:#000;font-weight:700;font-size:12px;padding:8px 12px;cursor:pointer}

.rec-overlay{display:none;position:absolute;bottom:100%;left:0;right:0;background:rgba(8,9,16,.96);border-top:1px solid rgba(248,113,113,.3);padding:14px 18px;align-items:center;justify-content:space-between;gap:12px}
.rec-overlay.show{display:flex}
.rec-dot{width:10px;height:10px;background:var(--red);border-radius:50%;animation:recP 1s infinite}
@keyframes recP{0%,100%{opacity:1}50%{opacity:.3}}
.rec-time{font-size:16px;color:var(--red);font-weight:600;min-width:40px}
.rec-hint{font-size:11px;color:var(--muted)}
.rec-cancel{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;padding:7px 12px;cursor:pointer}
.rec-send{background:var(--accent);border:none;border-radius:8px;color:#000;font-family:'Familjen Grotesk',sans-serif;font-size:13px;font-weight:700;padding:7px 14px;cursor:pointer}
.upload-preview{display:none;padding:8px 18px;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--s2)}
.upload-preview.show{display:flex}
.prev-item{position:relative;display:flex;align-items:center;gap:6px;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:5px 8px;max-width:200px}
.prev-item img{width:36px;height:36px;object-fit:cover;border-radius:4px}
.prev-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;flex:1}
.prev-rm{background:none;border:none;cursor:pointer;color:var(--red);font-size:14px}
.upload-progress{height:3px;background:var(--border);display:none}
.upload-progress.show{display:block}
.progress-bar{height:100%;background:var(--accent);width:0%;transition:width .3s}
.inp-area{padding:10px 18px 13px;display:flex;gap:8px;align-items:flex-end}
.msg-inp{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 13px;outline:none;transition:border-color .2s;resize:none;max-height:100px;overflow-y:auto;line-height:1.5}
.msg-inp:focus{border-color:var(--accent)}
.attach-btn,.gif-btn,.mic-btn{background:var(--s2);border:1px solid var(--border);border-radius:10px;cursor:pointer;color:var(--muted);padding:9px 11px;font-size:15px;transition:color .2s,border-color .2s;display:flex;align-items:center;flex-shrink:0}
.attach-btn:hover,.mic-btn:hover{color:var(--accent);border-color:var(--accent)}
.gif-btn{font-family:'Familjen Grotesk',sans-serif;font-size:12px;font-weight:700}
.gif-btn:hover,.gif-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(74,222,128,.08)}
.mic-btn{font-size:16px;user-select:none;-webkit-user-select:none;touch-action:none}
.mic-btn.holding{color:var(--red);border-color:var(--red);background:rgba(248,113,113,.15)}
.send-btn{background:var(--accent);border:none;border-radius:10px;cursor:pointer;color:#000;padding:9px 14px;font-size:16px;font-weight:700;display:flex;align-items:center;flex-shrink:0}
.gif-panel{position:absolute;bottom:100%;left:0;right:0;background:var(--s1);border-top:1px solid var(--border);height:320px;flex-direction:column;z-index:30;display:none}

.gif-search:focus{border-color:var(--accent)}

.voice-bar:nth-child(1){height:5px}.voice-bar:nth-child(2){height:12px;animation-delay:.08s}.voice-bar:nth-child(3){height:20px;animation-delay:.16s}.voice-bar:nth-child(4){height:10px;animation-delay:.24s}.voice-bar:nth-child(5){height:18px;animation-delay:.32s}.voice-bar:nth-child(6){height:7px;animation-delay:.4s}.voice-bar:nth-child(7){height:15px;animation-delay:.48s}.voice-bar:nth-child(8){height:9px;animation-delay:.56s}.voice-bar:nth-child(9){height:17px;animation-delay:.64s}.voice-bar:nth-child(10){height:6px;animation-delay:.72s}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.8)}}
.voice-duration{font-size:11px;color:var(--muted);flex-shrink:0}
/* misc */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.lightbox.show{opacity:1;pointer-events:all}
.lightbox-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 18px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.overlay{position:fixed;inset:0;background:rgba(8,9,16,.88);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.panic-btn{position:fixed;bottom:20px;left:20px;width:36px;height:36px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);border-radius:50%;cursor:pointer;font-size:15px;z-index:500;opacity:.3;display:flex;align-items:center;justify-content:center}
.panic-btn:hover{opacity:1;background:rgba(248,113,113,.3)}
body.mini .chat-wrap{position:fixed;bottom:16px;right:16px;width:325px;height:465px;border-radius:14px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.75)}
body.mini #chatScreen{align-items:flex-end;justify-content:flex-end;background:transparent}
</style>
</head>
<body>
<div class="overlay" id="overlay"><div class="spin"></div></div>
<div class="toast" id="toast"></div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()"><button class="lightbox-close">✕</button><div id="lightboxContent"></div></div>
<input type="file" id="fileInput" style="display:none" multiple accept="image/*,video/*,.pdf,.doc,.docx,.zip,.txt" onchange="handleFiles(this.files)">
<button class="panic-btn" onclick="panicClose()">🚨</button>

<!-- STATUS MODAL -->
<div class="modal-bg" id="statusModal" onclick="closeStatusModal()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-title">Ton statut</div>
    <div class="status-grid" id="statusGrid"></div>
    <button class="g-btn ghost" onclick="closeStatusModal()">Fermer</button>
  </div>
</div>

<!-- JOIN -->
<div class="screen" id="joinScreen">
  <div class="card">
    <div class="logo"><div class="logo-pulse"></div> ClassChat</div>
    <div><div class="card-title">Rejoins une <em>salle</em></div><div class="card-sub">// chat discret pour cours en live</div></div>
    <div class="sb-badge"><span style="color:var(--accent)">●</span> Supabase connecté</div>
    <div><div class="lbl">Ton pseudo</div><input type="text" id="pseudoIn" placeholder="ex: ghost99" maxlength="16" autocomplete="off"></div>
    <div><div class="lbl">Code de la salle</div><input type="text" id="codeIn" class="code-inp" placeholder="XXXXX" maxlength="6" autocomplete="off" oninput="this.value=this.value.toUpperCase()"></div>
    <div class="err" id="joinErr"></div>
    <button class="btn" onclick="joinRoom()">→ Rejoindre</button>
    <div class="divider">ou</div>
    <button class="btn btn-ghost" onclick="createRoom()">+ Créer une salle</button>
  </div>
</div>

<!-- CHAT -->
<div class="screen hidden" id="chatScreen">
  <div class="chat-wrap">
    <div class="chat-hdr">
      <div class="hdr-l">
        <span class="room-badge" id="roomBadge" onclick="copyCode()">????</span>
        <button class="status-badge" id="statusBadge" onclick="openStatusModal()">🔥 Actif</button>
        <div class="online"><div class="odot"></div><span id="onlineTxt">…</span></div>
      </div>
      <div class="hdr-r">
        <button class="ico" id="audioCallBtn" onclick="startCall(false)" title="Appel audio">🎙</button>
        <button class="ico" id="videoCallBtn" onclick="startCall(true)" title="Appel vidéo">📹</button>
        <button class="ico" onclick="openPanel('gamePanel')" title="Imposteur">🕵️</button>
        <button class="ico" onclick="openPanel('drawPanel')" title="Dessin">✏️</button>
        <button class="ico" onclick="openPanel('themePanel')" title="Thème">🎨</button>
        <button class="ico" onclick="openPanel('wpPanel')" title="Fond d'écran">🖼</button>
        <button class="ico" onclick="toggleMini()">⊡</button>
        <button class="ico" onclick="toggleUsers()">👥</button>
        <button class="ico" onclick="leaveRoom()">✕</button>
      </div>
    </div>

    <!-- CALL INCOMING -->
    <div class="call-incoming" id="callIncoming">
      <div class="call-incoming-title">Appel entrant</div>
      <div class="call-avatar-wrap"><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="call-avatar" id="callAvatar">?</div></div>
      <div class="call-incoming-sub" id="callIncomingText">quelqu'un appelle...</div>
      <div class="call-incoming-btns"><button class="ci-reject" onclick="rejectCall()">📵</button><button class="ci-accept" onclick="acceptCall()">📞</button></div>
    </div>

    <!-- CALL PANEL -->
    <div class="call-panel" id="callPanel">
      <div class="call-info" id="callInfo">Appel en cours...</div>
      <div class="call-grid" id="callGrid"></div>
      <div class="call-controls">
        <button class="call-btn mute" id="muteBtn" onclick="toggleMute()">🎙</button>
        <button class="call-btn cam" id="camBtn" onclick="toggleCam()">📹</button>
        <button class="call-btn share" id="shareBtn" onclick="toggleScreenShare()">🖥</button>
        <button class="call-btn end" onclick="endCall()">📵</button>
      </div>
    </div>

    <!-- WALLPAPER PANEL -->
    <div class="panel" id="wpPanel">
      <div class="panel-hdr"><button class="panel-back" onclick="closePanel('wpPanel')">←</button><h3>Fond d'écran</h3></div>
      <div class="wp-grid" id="wpGrid"></div>
    </div>

    <!-- THEME PANEL -->
    <div class="panel" id="themePanel">
      <div class="panel-hdr"><button class="panel-back" onclick="closePanel('themePanel')">←</button><h3>🎨 Thème</h3></div>
      <div class="theme-grid" id="themeGrid"></div>
    </div>

    <!-- GAME PANEL (Imposteur) -->
    <div class="panel" id="gamePanel" style="z-index:45">
      <div class="panel-hdr"><button class="panel-back" onclick="closePanel('gamePanel')">←</button><h3>🕵️ L'Imposteur</h3><span class="g-phase" id="gamePhase"></span></div>
      <div class="panel-body" id="gameBody"></div>
    </div>

    <!-- DRAW PANEL -->
    <div class="panel" id="drawPanel" style="z-index:45">
      <div class="panel-hdr"><button class="panel-back" onclick="closePanel('drawPanel')">←</button><h3 id="drawTitle">✏️ Dessin</h3><span class="draw-timer" id="drawTimer"></span></div>
      <div id="drawContent" style="display:flex;flex-direction:column;flex:1;overflow:hidden"></div>
    </div>

    <!-- UPANEL -->
    <div class="upanel" id="upanel"><div class="ptitle">Membres</div><div id="usersList"></div></div>

    <div class="msgs" id="msgs"></div>
    <div class="typing-bar empty" id="typingBar"><div class="typing-dots"><span></span><span></span><span></span></div><span id="typingNames"></span></div>

    <div class="inp-wrap">
      <div class="reply-bar" id="replyBar">
        <div class="reply-preview" id="replyPreview"><strong id="replyAuthor"></strong><span id="replyText"></span></div>
        <button class="reply-cancel" onclick="cancelReply()">✕</button>
      </div>
      <div class="edit-bar" id="editBar">
        <button class="edit-cancel-btn" onclick="cancelEdit()">✕</button>
        <input class="edit-inp" id="editInp" placeholder="Modifier..." onkeydown="if(event.key==='Enter')saveEdit()">
        <button class="edit-save" onclick="saveEdit()">✓ OK</button>
      </div>
      <div class="gif-panel" id="gifPanel">
        <div class="gif-search-wrap"><input class="gif-search" id="gifSearch" placeholder="Recherche un GIF..." oninput="searchGifs(this.value)"><button class="gif-close-btn" onclick="closeGifPanel()">✕</button></div>
        <div class="gif-grid" id="gifGrid"><div class="gif-loading">Tape pour chercher 🔍</div></div>
      </div>
      <div class="rec-overlay" id="recOverlay">
        <div style="display:flex;align-items:center;gap:10px"><div class="rec-dot"></div><span class="rec-time" id="recTime">0:00</span><span class="rec-hint">En cours...</span></div>
        <div style="display:flex;gap:8px"><button class="rec-cancel" onclick="cancelRecording()">✕ Annuler</button><button class="rec-send" onclick="sendRecording()">↑ Envoyer</button></div>
      </div>
      <div class="upload-preview" id="uploadPreview"></div>
      <div class="upload-progress" id="uploadProgress"><div class="progress-bar" id="progressBar"></div></div>
      <div class="mention-popup" id="mentionPopup"></div>
      <div class="inp-area">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <button class="gif-btn" id="gifBtn" onclick="toggleGifPanel()">GIF</button>
        <textarea class="msg-inp" id="msgInp" placeholder="Message... (@ pour mentionner)" rows="1"
          oninput="autoResize(this);onTyping();checkMention()"
          onkeydown="handleInpKeydown(event)"
          onblur="stopTyping()"></textarea>
        <button class="mic-btn" id="micBtn">🎤</button>
        <button class="send-btn" onclick="sendMsg()">↑</button>
      </div>
    </div>
  </div>
</div>

<script>

var IMGBB_KEY = '779fcd14aaa547f3a6252af04ce8fb50';

var COLORS = ['#4ade80','#f472b6','#60a5fa','#fb923c','#a78bfa','#2dd4bf','#fbbf24','#e879f9','#f43f5e','#34d399'];

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
function $(id) { return document.getElementById(id); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function rnd(a) { return a[Math.floor(Math.random()*a.length)]; }
function fmtT(ts) { return new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function fmtSz(b) { return b>1048576 ? (b/1048576).toFixed(1)+' MB' : (b/1024).toFixed(0)+' KB'; }
function loading(v) { $('overlay').classList.toggle('show',v); }
function toast(msg,d) {
  var t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, d||3000);
}
function showErr(id,msg) {
  var e=$(id); e.textContent=msg; e.classList.add('show');
  setTimeout(function(){ e.classList.remove('show'); }, 3500);
}
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function normalize(s) { return s.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,''); }
function isSimilar(a,b) { var na=normalize(a),nb=normalize(b); return na===nb||na.includes(nb)||nb.includes(na); }
function getFileType(file) {
  var mime=(file.type||'').toLowerCase(), name=(file.name||'').toLowerCase();
  if(mime.startsWith('image/')||/\.(jpg|jpeg|png|gif|webp|svg|bmp|heic|heif)$/.test(name)) return 'image';
  if(mime.startsWith('video/')||/\.(mp4|mov|avi|mkv|webm|m4v)$/.test(name)) return 'video';
  return 'file';
}
function renderHTML(m) {
  var parts = m.split(/(@\w+)/g);
  return parts.map(function(p) {
    if(p.charAt(0)==='@' && p.length>1) return '<span class="mention">'+esc(p)+'</span>';
    return esc(p);
  }).join('');
}

// ══════════════════════════════════════════════════════
// PANELS
// ══════════════════════════════════════════════════════
function openPanel(id) {
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('show'); });
  $(id).classList.add('show');

  if(id==='themePanel') renderThemes();
  if(id==='gamePanel') renderGameLobby();
  if(id==='drawPanel') renderDrawLobby();

function panicClose() {
  document.title = 'Google Docs';
  document.body.innerHTML = '<div style="background:#fff;min-height:100vh;font-family:Arial,sans-serif;padding:40px;color:#333"><h1 style="font-size:24px;font-weight:400;margin-bottom:20px">Document sans titre</h1><p style="color:#aaa;font-size:14px">Commencez à saisir...</p></div>';
}

// ══════════════════════════════════════════════════════
// STATUS
// ══════════════════════════════════════════════════════
var STATUSES = [
  {emoji:'🔥',label:'Actif'},
  {emoji:'💤',label:'Absent'},
  {emoji:'🧠',label:'Concentré'},
  {emoji:'😴',label:'Endormi'},
  {emoji:'🎮',label:'En jeu'},
  {emoji:'📚',label:'Révise'}
];
function openStatusModal() {
  $('statusGrid').innerHTML = STATUSES.map(function(s,i) {
    var sel = myStatus.emoji===s.emoji ? ' sel' : '';
    return '<div class="status-opt'+sel+'" onclick="setStatus('+i+')">'
      +'<span style="font-size:20px">'+s.emoji+'</span>'
      +'<span>'+s.label+'</span></div>';
  }).join('');
  $('statusModal').classList.add('show');
}
function closeStatusModal() { $('statusModal').classList.remove('show'); }
function setStatus(i) {
  myStatus = STATUSES[i];
  $('statusBadge').textContent = myStatus.emoji+' '+myStatus.label;
  closeStatusModal();
  toast('Statut mis à jour !');
  if(SB && S.code) {
    SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:'STATUS|'+S.pseudo+'|'+myStatus.emoji+'|'+myStatus.label});
  }
}

// ══════════════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════════════
var THEME_LIST = [
  {id:'green', name:'Vert',   color:'#4ade80'},
  {id:'red',   name:'Rouge',  color:'#f87171'},
  {id:'blue',  name:'Bleu',   color:'#60a5fa'},
  {id:'violet',name:'Violet', color:'#a78bfa'},
  {id:'orange',name:'Orange', color:'#fb923c'},
  {id:'pink',  name:'Rose',   color:'#f472b6'},
  {id:'cyan',  name:'Cyan',   color:'#2dd4bf'}
];
var currentTheme = 'green';
function renderThemes() {
  $('themeGrid').innerHTML = THEME_LIST.map(function(t) {
    var sel = currentTheme===t.id ? ' sel' : '';

// ══════════════════════════════════════════════════════
var mentionStart = -1;
function checkMention() {
  var inp = $('msgInp');
  var val = inp.value, pos = inp.selectionStart;
  var atIdx = val.lastIndexOf('@', pos-1);
  if(atIdx >= 0 && (atIdx===0 || val[atIdx-1]===' ' || val[atIdx-1]==='\n')) {
    var query = val.slice(atIdx+1, pos);
    if(query.indexOf(' ')===-1) {
      mentionStart = atIdx;
      var filtered = allMembers.filter(function(m){ return m!==S.pseudo && m.toLowerCase().startsWith(query.toLowerCase()); });
      if(filtered.length) { showMentionPopup(filtered); return; }
    }
  }
  hideMentionPopup();
}
function showMentionPopup(members) {
  var popup = $('mentionPopup');
  popup.innerHTML = members.slice(0,6).map(function(m,i) {
    var c = COLORS[m.charCodeAt(0)%COLORS.length];
    return '<div class="mention-item'+(i===0?' active':'')+'" data-name="'+m+'" onclick="insertMention(this.dataset.name)">'
      +'<div class="mention-dot" style="background:'+c+'"></div>'+esc(m)+'</div>';
  }).join('');
  popup.classList.add('show');
}
function hideMentionPopup() { $('mentionPopup').classList.remove('show'); }
function insertMention(name) {
  var inp = $('msgInp');
  var val = inp.value, pos = inp.selectionStart;
  var before = val.slice(0,mentionStart)+'@'+name+' ';
  var after = val.slice(pos);
  inp.value = before+after;
  inp.selectionStart = inp.selectionEnd = before.length;
  hideMentionPopup();
  inp.focus();
}
function handleInpKeydown(e) {
  var popup = $('mentionPopup');
  if(popup.classList.contains('show')) {
    var active = popup.querySelector('.mention-item.active');
    if(e.key==='Enter') {
      if(active){ e.preventDefault(); insertMention(active.dataset.name); return; }
    }
    if(e.key==='Escape'){ hideMentionPopup(); return; }
    if(e.key==='ArrowDown'||e.key==='ArrowUp') {
      e.preventDefault();
      var items = Array.from(popup.querySelectorAll('.mention-item'));
      var idx = items.indexOf(active);
      if(e.key==='ArrowDown') idx=(idx+1)%items.length; else idx=(idx-1+items.length)%items.length;
      items.forEach(function(x){ x.classList.remove('active'); });
      items[idx].classList.add('active');
      return;
    }
  }
  if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function processGame(content) {
  if(content.startsWith('🎮 START|')) {
    var p = content.split('|');
    game = {active:true,phase:'lobby',theme:p[1],realImg:p[2],fakeImg:p[3],players:{},impostorId:'',turnOrder:[],currentTurn:0,votes:{},myRole:''};

  } else if(content.startsWith('🎮 JOIN|')) {
    game.players[content.split('|')[1]] = true;
    if($('gamePanel').classList.contains('show')) renderGameActive();
  } else if(content.startsWith('🎮 DEAL|')) {
    var pp = content.split('|');
    game.impostorId = pp[1]; game.turnOrder = pp[2].split(','); game.phase='questions'; game.currentTurn=0;
    game.myRole = S.pseudo===pp[1] ? 'impostor' : 'innocent';
    if($('gamePanel').classList.contains('show')) renderGameActive();
    toast(game.myRole==='impostor' ? '👀 Tu es l\'IMPOSTEUR !' : '✅ Tu es innocent !', 5000);
  } else if(content.startsWith('🎮 TURN|')) {
    game.currentTurn = parseInt(content.split('|')[1]);
    if($('gamePanel').classList.contains('show')) renderGameActive();
  } else if(content==='🎮 VOTE_START') {
    game.phase='vote';
    if($('gamePanel').classList.contains('show')) renderGameActive();
  } else if(content.startsWith('🎮 VOTE|')) {
    var vp = content.split('|'); game.votes[vp[1]]=vp[2];
    if($('gamePanel').classList.contains('show')) renderGameActive();
  } else if(content==='🎮 REVEAL') {
    game.phase='results';
    if($('gamePanel').classList.contains('show')) renderGameActive();
  } else if(content==='🎮 RESET') {
    game = {active:false,phase:'lobby',theme:'',realImg:'',fakeImg:'',players:{},impostorId:'',turnOrder:[],currentTurn:0,votes:{},myRole:''};
    if($('gamePanel').classList.contains('show')) renderGameLobby();

}

var drawColor = '#4ade80', drawSize = 4;
var DRAW_WORDS = ['chat','chien','maison','voiture','soleil','pizza','ordinateur','guitare','ballon','école','livre','téléphone','arbre','avion','bateau','vélo','fleur','lune','étoile','montagne','plage','robot','dragon','licorne','château','fusée','dinosaure','hibou','pieuvre','cactus'];

function startDraw() {

  var word = DRAW_WORDS[Math.floor(Math.random()*DRAW_WORDS.length)];

  draw.players[S.pseudo] = 0;
  SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:'🖊 JOIN|'+S.pseudo});
}
function processDraw(content) {
  if(content.startsWith('🖊 START|')) {
    var p = content.split('|');
    draw = {active:true,phase:'drawing',drawer:p[1],word:p[2],guesses:[],players:{},timeLeft:60};
    p[3].split(',').forEach(function(x){ if(x) draw.players[x]=0; });
    var isDrawer = S.pseudo===draw.drawer;
    if($('drawPanel').classList.contains('show')) enterDrawPhase(isDrawer, isDrawer?draw.word:'???');
    else toast('✏️ Partie de dessin lancée — clique sur ✏️ pour rejoindre !');
  } else if(content.startsWith('🖊 JOIN|')) {
    draw.players[content.split('|')[1]] = 0;
    if($('drawPanel').classList.contains('show')) renderDrawLobby();
  } else if(content.startsWith('🖊 GUESS|')) {
    var gp = content.split('|'), who=gp[1], guess=gp[2];
    var correct = guess.toLowerCase().trim()===draw.word.toLowerCase().trim();
    if(correct) draw.players[who]=(draw.players[who]||0)+1;
    draw.guesses.push({who:who,text:guess,correct:correct});
    if(correct) toast('✅ '+who+' a trouvé le mot !');
    updateDrawGuesses();
  } else if(content==='🖊 END') {
    draw.phase = 'results';
    if(drawTimer) clearInterval(drawTimer);
    if($('drawPanel').classList.contains('show')) showDrawResults();
  } else if(content==='🖊 RESET') {
    draw = {active:false,phase:'lobby',drawer:'',word:'',guesses:[],players:{},timeLeft:0};
    if(drawTimer) clearInterval(drawTimer);
    if($('drawPanel').classList.contains('show')) renderDrawLobby();
  }
}
function enterDrawPhase(isDrawer, word) {
  $('drawTitle').textContent = isDrawer ? 'Tu dessines !' : 'Devine !';
  draw.timeLeft = 60;
  if(drawTimer) clearInterval(drawTimer);
  drawTimer = setInterval(function() {
    draw.timeLeft--;
    $('drawTimer').textContent = draw.timeLeft+'s';
    if(draw.timeLeft<=0) { clearInterval(drawTimer); SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:'🖊 END'}); }
  }, 1000);

  var dc = $('drawContent');
  dc.innerHTML = '';

  // Word display
  var wd = document.createElement('div'); wd.className='draw-word'; wd.id='drawWord';
  wd.textContent = isDrawer ? 'Mot: '+word : word.replace(/\S/g,'_').split('').join(' ');
  dc.appendChild(wd);

  // Canvas
  var wrap = document.createElement('div'); wrap.className='draw-canvas-wrap';
  canvas = document.createElement('canvas'); canvas.className='draw-canvas';
  wrap.appendChild(canvas); dc.appendChild(wrap);

  // Guesses list
  var gl = document.createElement('div'); gl.className='draw-guesses'; gl.id='drawGuesses'; dc.appendChild(gl);

  // Tools or guess input
  if(isDrawer) {
    var tools = document.createElement('div'); tools.className='draw-tools';
    var dColors = ['#4ade80','#f87171','#60a5fa','#fbbf24','#e879f9','#fff','#111'];
    dColors.forEach(function(c) {
      var d = document.createElement('div'); d.className='draw-color'+(c===drawColor?' sel':'');
      d.style.background=c; d.setAttribute('data-c',c);
      d.onclick = function() { drawColor=this.dataset.c; document.querySelectorAll('.draw-color').forEach(function(x){x.classList.remove('sel');}); d.classList.add('sel'); };
      tools.appendChild(d);
    });
    var sz = document.createElement('input'); sz.type='range'; sz.min=2; sz.max=20; sz.value=drawSize; sz.className='draw-size';
    sz.oninput = function(){ drawSize=parseInt(sz.value); }; tools.appendChild(sz);
    var clr = document.createElement('button'); clr.className='draw-clr'; clr.textContent='🗑 Effacer';
    clr.onclick = clearCanvas; tools.appendChild(clr);
    dc.appendChild(tools);
  } else {
    var gr = document.createElement('div'); gr.className='draw-guess-row';
    var gi = document.createElement('input'); gi.className='draw-guess-inp'; gi.placeholder='Tape ta réponse...';
    gi.onkeydown = function(e){ if(e.key==='Enter') submitGuess(gi); };
    var gb = document.createElement('button'); gb.style.cssText='background:var(--accent);border:none;border-radius:8px;color:#000;font-weight:700;font-size:13px;padding:8px 14px;cursor:pointer';
    gb.textContent='→'; gb.onclick=function(){ submitGuess(gi); };
    gr.appendChild(gi); gr.appendChild(gb); dc.appendChild(gr);
  }

  setTimeout(function() { initCanvas(isDrawer); }, 60);

  if(!drawChannel) {
    drawChannel = SB.channel('draw-'+S.code)
      .on('broadcast',{event:'stroke'},function(msg){ if(S.pseudo!==draw.drawer) remoteStroke(msg.payload); })
      .on('broadcast',{event:'clear'},function(){ if(ctx) ctx.clearRect(0,0,canvas.width,canvas.height); })
      .subscribe();
  }
}
function initCanvas(isDrawer) {
  if(!canvas) return;
  var wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth; canvas.height = wrap.clientHeight;
  ctx = canvas.getContext('2d'); ctx.lineCap='round'; ctx.lineJoin='round';
  if(!isDrawer) return;
  function getPos(e) {
    var r=canvas.getBoundingClientRect(), src=e.touches?e.touches[0]:e;
    return [src.clientX-r.left, src.clientY-r.top];
  }
  canvas.onmousedown = function(e){ drawing=true; var p=getPos(e); lastX=p[0]; lastY=p[1]; };
  canvas.onmousemove = function(e){ if(!drawing) return; var p=getPos(e); doStroke(lastX,lastY,p[0],p[1]); lastX=p[0]; lastY=p[1]; };
  canvas.onmouseup = canvas.onmouseleave = function(){ drawing=false; };
  canvas.addEventListener('touchstart',function(e){ e.preventDefault(); drawing=true; var p=getPos(e); lastX=p[0]; lastY=p[1]; },{passive:false});
  canvas.addEventListener('touchmove',function(e){ e.preventDefault(); if(!drawing) return; var p=getPos(e); doStroke(lastX,lastY,p[0],p[1]); lastX=p[0]; lastY=p[1]; },{passive:false});
  canvas.addEventListener('touchend',function(){ drawing=false; });
}
function doStroke(x1,y1,x2,y2) {
  if(!ctx) return;
  ctx.strokeStyle=drawColor; ctx.lineWidth=drawSize;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  if(drawChannel) drawChannel.send({type:'broadcast',event:'stroke',payload:{x1:x1,y1:y1,x2:x2,y2:y2,c:drawColor,s:drawSize,w:canvas.width,h:canvas.height}});
}
function remoteStroke(d) {
  if(!ctx||!canvas) return;
  var sx=canvas.width/d.w, sy=canvas.height/d.h;
  ctx.strokeStyle=d.c; ctx.lineWidth=d.s;
  ctx.beginPath(); ctx.moveTo(d.x1*sx,d.y1*sy); ctx.lineTo(d.x2*sx,d.y2*sy); ctx.stroke();
}
function clearCanvas() {
  if(ctx) ctx.clearRect(0,0,canvas.width,canvas.height);
  if(drawChannel) drawChannel.send({type:'broadcast',event:'clear',payload:{}});
}
function submitGuess(inp) {
  var guess=(inp||$('drawGuessInp')).value.trim(); if(!guess) return; inp.value='';
  SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:'🖊 GUESS|'+S.pseudo+'|'+guess});

var mediaRecorder=null, audioChunks=[], recInterval=null, recSeconds=0, isRecording=false;
function setupMicButton() {
  var btn=$('micBtn');
  btn.addEventListener('touchstart',function(e){ e.preventDefault(); startRecording(); },{passive:false});
  btn.addEventListener('mousedown',function(e){ e.preventDefault(); startRecording(); });
}
function startRecording() {
  if(isRecording) return;
  navigator.mediaDevices.getUserMedia({audio:true,video:false}).then(function(stream) {
    isRecording=true; audioChunks=[]; recSeconds=0; $('micBtn').classList.add('holding');
    var mimeType=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'].find(function(m){ return MediaRecorder.isTypeSupported(m); })||'';
    mediaRecorder=new MediaRecorder(stream,mimeType?{mimeType:mimeType}:{});
    mediaRecorder.ondataavailable=function(e){ if(e.data&&e.data.size>0) audioChunks.push(e.data); };
    mediaRecorder.onstop=function(){ stream.getTracks().forEach(function(t){ t.stop(); }); };
    mediaRecorder.start(100);
    $('recOverlay').classList.add('show');
    recInterval=setInterval(function(){ recSeconds++; $('recTime').textContent=Math.floor(recSeconds/60)+':'+(recSeconds%60).toString().padStart(2,'0'); },1000);
    toast('🎤 Appuie sur Envoyer quand tu as fini');
  }).catch(function(){ isRecording=false; toast('⚠ Micro refusé',4000); });
}
function cancelRecording() {
  clearInterval(recInterval);
  if(mediaRecorder&&mediaRecorder.state!=='inactive') mediaRecorder.stop();
  mediaRecorder=null; audioChunks=[]; isRecording=false; recSeconds=0;
  $('recOverlay').classList.remove('show'); $('micBtn').classList.remove('holding'); $('recTime').textContent='0:00';
  toast('Vocal annulé');
}
function sendRecording() {
  if(!mediaRecorder||!isRecording) return;
  clearInterval(recInterval);
  var duration=$('recTime').textContent;
  new Promise(function(resolve){
    mediaRecorder.onstop=function(){ if(mediaRecorder.stream) mediaRecorder.stream.getTracks().forEach(function(t){t.stop();}); resolve(); };
    if(mediaRecorder.state!=='inactive') mediaRecorder.stop(); else resolve();
  }).then(function(){
    $('recOverlay').classList.remove('show'); $('micBtn').classList.remove('holding'); isRecording=false;
    if(!audioChunks.length||recSeconds<1){ toast('⚠ Vocal trop court'); return; }
    var blob=new Blob(audioChunks,{type:mediaRecorder.mimeType||'audio/webm'});
    audioChunks=[]; recSeconds=0; $('recTime').textContent='0:00';
    toast('⏫ Envoi vocal...',5000);
    uploadAudioToCloudinary(blob).then(function(url){
      SB.from('messages').insert({room_code:S.code,type:'media',author:S.pseudo,color:S.color,content:'',reactions:{},file_url:url,file_name:'Vocal '+duration,file_size:blob.size,file_type:'audio'});
      toast('✓ Vocal envoyé ! 🎤');
    }).catch(function(e){ toast('⚠ '+e.message,5000); });
  });
}

function uploadToImgbb(file) {
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onload=function(){
      var base64=reader.result.split(',')[1];
      var form=new FormData(); form.append('key',IMGBB_KEY); form.append('image',base64);
      fetch('https://api.imgbb.com/1/upload',{method:'POST',body:form})
        .then(function(r){ return r.json(); })
        .then(function(json){ if(!json.success) throw new Error(json.error&&json.error.message||'Erreur imgbb'); resolve(json.data.url); })
        .catch(reject);
    };
    reader.onerror=function(){ reject(new Error('Lecture échouée')); };
    reader.readAsDataURL(file);
  });
}
function uploadAudioToCloudinary(blob) {
  var form=new FormData(); form.append('file',blob,'vocal.webm'); form.append('upload_preset',CLOUD_PRESET);
  return fetch('https://api.cloudinary.com/v1_1/'+CLOUD_NAME+'/video/upload',{method:'POST',body:form})
    .then(function(r){ if(!r.ok) throw new Error('Cloudinary '+r.status); return r.json(); })
    .then(function(json){ if(json.error) throw new Error(json.error.message); return json.secure_url; });
}
function handleFiles(files) {
  for(var i=0;i<files.length;i++){
    var f=files[i]; if(f.size>32*1024*1024){ toast('⚠ Max 32MB'); continue; }
    pendingFiles.push({file:f,previewUrl:getFileType(f)==='image'?URL.createObjectURL(f):null,type:getFileType(f)});
  }
  renderPreviews(); $('fileInput').value='';
}
function renderPreviews() {
  var w=$('uploadPreview');
  if(!pendingFiles.length){ w.classList.remove('show'); return; }
  w.classList.add('show');
  w.innerHTML=pendingFiles.map(function(p,i){
    return '<div class="prev-item">'+(p.previewUrl?'<img src="'+p.previewUrl+'">':(p.type==='video'?'<span style="font-size:20px">🎬</span>':'<span style="font-size:20px">📄</span>'))
      +'<span class="prev-name">'+esc(p.file.name)+'</span>'
      +'<button class="prev-rm" data-i="'+i+'" onclick="removeFile(this.dataset.i)">✕</button></div>';
  }).join('');
}
function removeFile(i) { pendingFiles.splice(parseInt(i),1); renderPreviews(); }

  if(pendingFiles.length) {

    function uploadNext() {
      if(idx>=toUp.length){ $('progressBar').style.width='100%'; setTimeout(function(){ $('uploadProgress').classList.remove('show'); $('progressBar').style.width='0%'; },500); return; }
      var item=toUp[idx]; $('progressBar').style.width=Math.round((idx/toUp.length)*90)+'%'; toast('⏫ Envoi...');
      var uploadProm;
      if(item.type==='image') uploadProm=uploadToImgbb(item.file);

        var ext=item.file.name.split('.').pop()||'bin', path=S.code+'/'+Date.now()+'.'+ext;

          .then(function(r){ if(!r.ok) throw new Error('Upload error'); return SB_URL+'/storage/v1/object/public/chat-files/'+path; });
      }
      uploadProm.then(function(url){
        return SB.from('messages').insert({room_code:S.code,type:'media',author:S.pseudo,color:S.color,content:(idx===toUp.length-1&&text)?text:'',reactions:{},file_url:url,file_name:item.file.name,file_size:item.file.size,file_type:item.type});
      }).then(function(){ idx++; uploadNext(); }).catch(function(e){ toast('⚠ '+e.message,4000); idx++; uploadNext(); });
    }
    uploadNext();
  } else {
    var payload={room_code:S.code,type:'msg',author:S.pseudo,color:S.color,content:text,reactions:{}};
    if(replyTo){ payload.reply_id=replyTo.id; payload.reply_author=replyTo.author; payload.reply_text=replyTo.text; }

var lkRoom=null, localTracks=[], isMuted=false, isCamOff=false, screenTrack=null, callType='audio';
function startCall(withVideo) {
  if(lkRoom){ toast('Appel déjà en cours'); return; }
  callType=withVideo?'video':'audio';
  SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:'📞 '+S.pseudo+' a lancé un appel '+callType});
  joinLiveKit(withVideo);
}
function acceptCall() { $('callIncoming').classList.remove('show'); joinLiveKit(callType==='video'); }
function rejectCall() { $('callIncoming').classList.remove('show'); toast('Appel refusé'); }
function joinLiveKit(withVideo) {
  import('https://cdn.jsdelivr.net/npm/livekit-client@2/+esm').then(function(lk){
    return fetch(TOKEN_API+'?room='+S.code+'&username='+encodeURIComponent(S.pseudo))
      .then(function(r){ if(!r.ok) throw new Error('Token '+r.status); return r.json(); })
      .then(function(json){
        lkRoom=new lk.Room();
        lkRoom.on(lk.RoomEvent.ParticipantConnected,addCallTile);
        lkRoom.on(lk.RoomEvent.ParticipantDisconnected,function(p){ removeCallTile(p.identity); });
        lkRoom.on(lk.RoomEvent.TrackSubscribed,function(track,pub,participant){
          var tile=document.querySelector('[data-identity="'+participant.identity+'"]'); if(!tile) return;
          if(track.kind===lk.Track.Kind.Video){ var vid=track.attach(); vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover'; tile.appendChild(vid); }
        });
        lkRoom.on(lk.RoomEvent.TrackUnsubscribed,function(track){ track.detach(); });
        return lkRoom.connect(LK_URL,json.token);
      }).then(function(){
        return lk.createLocalTracks({audio:true,video:withVideo});
      }).then(function(tracks){
        localTracks=tracks;
        return Promise.all(tracks.map(function(t){ return lkRoom.localParticipant.publishTrack(t); }));
      }).then(function(){
        var tile=document.createElement('div'); tile.className='call-tile'; tile.dataset.identity='__local__';
        var ava=document.createElement('div'); ava.className='call-tile-ava'; ava.style.background=S.color; ava.textContent=S.pseudo[0].toUpperCase();
        var nm=document.createElement('div'); nm.className='call-tile-name'; nm.textContent='Toi';
        tile.appendChild(ava); tile.appendChild(nm); $('callGrid').appendChild(tile);
        $('callPanel').classList.add('show'); $('audioCallBtn').classList.add('call-active');
        if(withVideo) $('videoCallBtn').classList.add('call-active');
        updateCallInfo(); toast('✓ Connecté à l\'appel !');
      });
  }).catch(function(e){ toast('⚠ Erreur appel: '+e.message,5000); lkRoom=null; });
}
function addCallTile(p) {
  var g=$('callGrid'); if(g.querySelector('[data-identity="'+p.identity+'"]')) return;
  var t=document.createElement('div'); t.className='call-tile'; t.dataset.identity=p.identity;
  var c=COLORS[p.identity.charCodeAt(0)%COLORS.length];
  var a=document.createElement('div'); a.className='call-tile-ava'; a.style.background=c; a.textContent=p.identity[0].toUpperCase();
  var n=document.createElement('div'); n.className='call-tile-name'; n.textContent=p.identity;
  t.appendChild(a); t.appendChild(n); g.appendChild(t); updateCallInfo();
}
function removeCallTile(id) { var el=document.querySelector('[data-identity="'+id+'"]'); if(el) el.remove(); updateCallInfo(); }
function updateCallInfo() { var c=$('callGrid').children.length; $('callInfo').textContent=c+' participant'+(c>1?'s':'')+' dans l\'appel'; }
function toggleMute() { isMuted=!isMuted; localTracks.filter(function(t){return t.kind==='audio';}).forEach(function(t){t.enabled=!isMuted;}); $('muteBtn').textContent=isMuted?'🔇':'🎙'; $('muteBtn').classList.toggle('on',isMuted); }
function toggleCam() { isCamOff=!isCamOff; localTracks.filter(function(t){return t.kind==='video';}).forEach(function(t){t.enabled=!isCamOff;}); $('camBtn').textContent=isCamOff?'🚫':'📹'; $('camBtn').classList.toggle('off',isCamOff); }
function toggleScreenShare() {
  if(!lkRoom){ toast('Lance un appel d\'abord'); return; }
  if(screenTrack){
    screenTrack.stop();
    lkRoom.localParticipant.unpublishTrack(screenTrack).catch(function(){});
    screenTrack=null; $('shareBtn').classList.remove('on'); $('shareBtn').textContent='🖥'; toast('Partage arrêté'); return;
  }
  import('https://cdn.jsdelivr.net/npm/livekit-client@2/+esm').then(function(lk){
    return navigator.mediaDevices.getDisplayMedia({video:true,audio:false}).then(function(stream){
      screenTrack=new lk.LocalVideoTrack(stream.getVideoTracks()[0],undefined,false);
      return lkRoom.localParticipant.publishTrack(screenTrack,{source:'screen_share'}).then(function(){
        $('shareBtn').classList.add('on'); $('shareBtn').textContent='⏹';
        stream.getVideoTracks()[0].onended=toggleScreenShare;
        toast('✓ Partage d\'écran actif !');
      });
    });
  }).catch(function(e){ if(e.name!=='NotAllowedError') toast('⚠ '+e.message,4000); });
}
function endCall() {
  if(screenTrack){ try{ screenTrack.stop(); if(lkRoom) lkRoom.localParticipant.unpublishTrack(screenTrack); }catch(e){} screenTrack=null; }
  localTracks.forEach(function(t){ t.stop(); }); localTracks=[];
  if(lkRoom) lkRoom.disconnect(); lkRoom=null; isMuted=false; isCamOff=false;
  $('callPanel').classList.remove('show'); $('callGrid').innerHTML='';
  $('audioCallBtn').classList.remove('call-active'); $('videoCallBtn').classList.remove('call-active');
  $('muteBtn').textContent='🎙'; $('camBtn').textContent='📹'; $('shareBtn').textContent='🖥'; toast('Appel terminé');
}

// ══════════════════════════════════════════════════════
// AUDIO PLAYER
// ══════════════════════════════════════════════════════
var currentAudio=null;
function playAudio(btn, url) {
  if(currentAudio&&!currentAudio.paused){ currentAudio.pause(); document.querySelectorAll('.voice-wave').forEach(function(w){w.classList.remove('playing');}); document.querySelectorAll('.voice-play').forEach(function(b){b.textContent='▶';}); if(currentAudio._url===url){currentAudio=null;return;} }
  var audio=new Audio(url); audio._url=url; currentAudio=audio;
  btn.textContent='⏸'; btn.closest('.voice-bubble').querySelector('.voice-wave').classList.add('playing');
  audio.play().catch(function(){ toast('⚠ Lecture impossible'); });
  audio.onended=function(){ btn.textContent='▶'; var w=btn.closest('.voice-bubble'); if(w) w.querySelector('.voice-wave').classList.remove('playing'); currentAudio=null; };
  audio.onerror=function(){ btn.textContent='▶'; toast('⚠ Erreur lecture'); };
}

// ══════════════════════════════════════════════════════
// JOIN / CREATE
// ══════════════════════════════════════════════════════
function genCode() { var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; return Array.from({length:5},function(){ return c[Math.floor(Math.random()*c.length)]; }).join(''); }
function getActivePseudos(code) {
  return Promise.all([
    SB.from('messages').select('author').eq('room_code',code).eq('type','system').ilike('content','% a rejoint %'),
    SB.from('messages').select('author').eq('room_code',code).eq('type','system').ilike('content','% a quitté %')
  ]).then(function(results){
    var joined=results[0], left=results[1];
    var active=new Set((joined.data||[]).map(function(r){ return r.author; }).filter(Boolean));
    (left.data||[]).forEach(function(r){ active.delete(r.author); });
    return Array.from(active);
  });
}
function joinRoom() {
  var pseudo=$('pseudoIn').value.trim(), code=$('codeIn').value.trim().toUpperCase();
  if(!pseudo||pseudo.length<2) return showErr('joinErr','Pseudo trop court');
  if(!code||code.length<4) return showErr('joinErr','Code trop court');
  loading(true);
  SB.from('messages').select('id').eq('room_code',code).limit(1).then(function(res){
    if(res.error){ loading(false); return showErr('joinErr','Erreur: '+res.error.message); }
    if(!res.data||!res.data.length){ loading(false); return showErr('joinErr','Salle introuvable'); }
    return getActivePseudos(code).then(function(actives){
      loading(false);
      var conflict=actives.find(function(p){ return isSimilar(pseudo,p); });
      if(conflict) return showErr('joinErr','Pseudo similaire à "'+conflict+'" déjà pris');
      enter(pseudo,code);
    });
  }).catch(function(e){ loading(false); showErr('joinErr','Erreur: '+e.message); });
}
function createRoom() {
  var pseudo=$('pseudoIn').value.trim();
  if(!pseudo||pseudo.length<2) return showErr('joinErr','Entre ton pseudo d\'abord');
  var code=genCode(); loading(true);
  SB.from('messages').insert({room_code:code,type:'system',content:'Salle créée par '+pseudo}).then(function(res){
    loading(false); if(res.error) return showErr('joinErr','Erreur: '+res.error.message);
    enter(pseudo,code); toast('Salle créée: '+code+' 🎉');
  });
}
function enter(pseudo, code) {
  var color=rnd(COLORS);
  S.pseudo=pseudo; S.code=code; S.color=color;
  $('roomBadge').textContent=code;
  $('joinScreen').classList.add('hidden'); $('chatScreen').classList.remove('hidden'); $('msgInp').focus();
  SB.from('messages').insert({room_code:code,type:'system',author:pseudo,content:pseudo+' a rejoint la salle'}).then(function(){
    return SB.from('messages').select('*').eq('room_code',code).order('created_at',{ascending:true});
  }).then(function(res){
    renderMsgs(res.data||[]);
    refreshOnline();
  });
  S.sub=SB.channel('room-'+code)
    .on('postgres_changes',{event:'*',schema:'public',table:'messages',filter:'room_code=eq.'+code},function(p){
      if(p.eventType==='INSERT'){
        appendMsg(p.new); refreshOnline();
        var c=p.new.content||'';
        if(c.startsWith('🎮 ')) processGame(c);
        if(c.startsWith('🖊 ')) processDraw(c);
        if(c.includes('a lancé un appel')&&p.new.author!==S.pseudo){
          callType=c.includes('vidéo')?'video':'audio';
          var caller=p.new.author, col=COLORS[caller.charCodeAt(0)%COLORS.length];
          $('callIncomingText').textContent=caller+' • appel '+callType;
          $('callAvatar').textContent=caller[0].toUpperCase(); $('callAvatar').style.background=col;
          document.querySelectorAll('.ring').forEach(function(r){ r.style.borderColor=col+'66'; });
          $('callIncoming').classList.add('show');
          setTimeout(function(){ $('callIncoming').classList.remove('show'); },20000);
        }
      }
      if(p.eventType==='UPDATE'){
        updateReactions(p.new);
        if(p.new.edited){
          var el=document.querySelector('[data-msgid="'+p.new.id+'"]');
          if(el){
            var sp=el.querySelector('.bubble > span:not(.msg-edited)'); if(sp) sp.innerHTML=renderHTML(p.new.content);
            if(!el.querySelector('.msg-edited')){ var tag=document.createElement('span'); tag.className='msg-edited'; tag.textContent=' (modifié)'; el.querySelector('.msg-meta').appendChild(tag); }
          }
        }
      }
    }).subscribe();
  S.typingSub=SB.channel('typing-'+code)
    .on('postgres_changes',{event:'*',schema:'public',table:'typing',filter:'room_code=eq.'+code},function(){
      SB.from('typing').select('author').eq('room_code',code).then(function(r){ updateTypingBar((r.data||[]).map(function(x){ return x.author; })); });
    }).subscribe();
  setInterval(function(){ var cutoff=new Date(Date.now()-5000).toISOString(); SB.from('typing').delete().eq('room_code',code).lt('updated_at',cutoff); },3000);
}
function refreshOnline() {
  getActivePseudos(S.code).then(function(a){
    allMembers = a;
    $('onlineTxt').textContent=(a.length||1)+' en ligne';
    $('usersList').innerHTML=a.map(function(n){
      return '<div class="uitem"><div class="ava" style="background:'+COLORS[n.charCodeAt(0)%COLORS.length]+'">'+n[0].toUpperCase()+'</div><span>'+esc(n)+'</span></div>';
    }).join('');
  });
}

// ══════════════════════════════════════════════════════
// UI
// ══════════════════════════════════════════════════════
function leaveRoom() {
  stopTyping(); endCall();
  SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:S.pseudo+' a quitté la salle'});
  if(S.sub) SB.removeChannel(S.sub); if(S.typingSub) SB.removeChannel(S.typingSub);
  if(drawChannel){ SB.removeChannel(drawChannel); drawChannel=null; }
  S={pseudo:'',color:'',code:'',mini:false,sub:null,typingSub:null}; pendingFiles=[];
  $('chatScreen').classList.add('hidden'); $('joinScreen').classList.remove('hidden');
  $('codeIn').value=''; $('msgs').innerHTML=''; $('typingBar').classList.add('empty');
  document.body.classList.remove('mini');
}
function openLightbox(url, isVid) { $('lightboxContent').innerHTML=isVid?'<video src="'+url+'" controls autoplay style="max-width:90vw;max-height:90vh;border-radius:8px"></video>':'<img src="'+url+'" style="max-width:90vw;max-height:90vh;border-radius:8px">'; $('lightbox').classList.add('show'); }
function closeLightbox() { $('lightbox').classList.remove('show'); }
function copyCode() { navigator.clipboard.writeText(S.code).then(function(){ toast('Code copié 📋'); }); }
function toggleMini() { S.mini=!S.mini; document.body.classList.toggle('mini',S.mini); }
function toggleUsers() { $('upanel').classList.toggle('open'); }

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function renderMsgs(msgs) { var c=$('msgs'); c.innerHTML=msgs.map(buildHTML).join(''); c.scrollTop=c.scrollHeight; }
function appendMsg(m) {
  var c=$('msgs'), atBottom=c.scrollHeight-c.scrollTop-c.clientHeight<80;
  var html=buildHTML(m); if(html) { c.insertAdjacentHTML('beforeend',html); if(atBottom) c.scrollTop=c.scrollHeight; }
}
function updateReactions(m) {
  var el=document.querySelector('[data-msgid="'+m.id+'"]'); if(!el) return;
  var old=el.querySelector('.reactions'); var html=buildReactionsHTML(m);
  if(old) old.outerHTML=html||'<span></span>'; else if(html) el.insertAdjacentHTML('beforeend',html);
}
function buildHTML(m) {
  if(m.type==='system') {
    var c=m.content||'';
    if(c.startsWith('🎮 ')||c.startsWith('🖊 ')||c.startsWith('STATUS|')||c.startsWith('📞 ')) return '';
    return '<div class="msg system"><div class="bubble">'+esc(c)+'</div></div>';
  }
  var mine=m.author===S.pseudo, time=fmtT(m.created_at||Date.now()), color=m.color||COLORS[0];
  var replyCtx='';
  if(m.reply_id&&m.reply_author) replyCtx='<div class="msg-reply-ctx" data-rid="'+m.reply_id+'" onclick="scrollToMsg(this.dataset.rid)"><strong>'+esc(m.reply_author)+'</strong>'+esc((m.reply_text||'').slice(0,50))+'</div>';
  var media='';
  if(m.file_url){
    var ft=m.file_type||'file';
    if(ft==='audio'){
      var dur=(m.file_name||'').replace('Vocal ','');
      media='<div class="voice-bubble"><button class="voice-play" data-url="'+m.file_url+'" onclick="playAudio(this,this.dataset.url)">▶</button><div class="voice-wave"><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span></div><span class="voice-duration">'+esc(dur)+'</span></div>';
    } else if(ft==='gif') {
      media='<img style="max-width:200px;border-radius:8px;display:block;cursor:pointer" src="'+m.file_url+'" data-url="'+m.file_url+'" onclick="openLightbox(this.dataset.url,false)">';
    } else if(ft==='image') {
      media='<img style="max-width:220px;border-radius:8px;display:block;cursor:pointer;margin-top:4px" src="'+m.file_url+'" loading="lazy" data-url="'+m.file_url+'" onclick="openLightbox(this.dataset.url,false)">';
    } else if(ft==='video') {
      media='<video style="max-width:100%;max-height:240px;border-radius:8px;display:block;margin-top:4px" src="'+m.file_url+'" controls preload="metadata"></video>';
    } else {
      var icon=m.file_name&&m.file_name.endsWith('.pdf')?'📄':m.file_name&&m.file_name.endsWith('.zip')?'🗜️':'📎';
      media='<a href="'+m.file_url+'" target="_blank" style="display:flex;align-items:center;gap:8px;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-top:4px;text-decoration:none;color:var(--text)"><span style="font-size:22px">'+icon+'</span><span style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px">'+esc(m.file_name||'fichier')+'</span>'+(m.file_size?'<span style="font-size:10px;color:var(--muted)">'+fmtSz(m.file_size)+'</span>':'')+'</a>';
    }
  }
  var picker='<div class="picker hidden" data-id="'+m.id+'">'+EMOJIS.map(function(e){ return '<button class="emo" data-mid="'+m.id+'" data-emoji="'+e+'" onclick="addReaction(this.dataset.mid,this.dataset.emoji,event)">'+e+'</button>'; }).join('')+'</div>';
  var editedTag=m.edited?'<span class="msg-edited"> (modifié)</span>':'';
  var safeContent=(m.content||'').replace(/\\/g,'\\\\').replace(/'/g,'&#39;');
  var safeAuthor=(m.author||'').replace(/'/g,'&#39;');
  var actions='<div class="bubble-actions">'
    +'<button class="bact" data-mid="'+m.id+'" onclick="togglePicker(this.dataset.mid,event)" title="Réagir">＋</button>'
    +'<button class="bact" data-mid="'+m.id+'" data-author="'+esc(m.author)+'" data-text="'+esc((m.content||'').slice(0,100))+'" onclick="startReply(this.dataset.mid,this.dataset.author,this.dataset.text)" title="Répondre">↩</button>'
    +(mine?'<button class="bact" data-mid="'+m.id+'" data-text="'+esc(m.content||'')+'" onclick="startEdit(this.dataset.mid,this.dataset.text)" title="Modifier">✏️</button>':'')
    +'</div>';
  return '<div class="msg '+(mine?'mine':'theirs')+'" data-msgid="'+m.id+'">'
    +'<div class="msg-meta">'+(mine?'':'<span style="color:'+color+';font-weight:600">'+esc(m.author)+'</span>')+'<span>'+time+'</span>'+editedTag+'</div>'
    +'<div class="bubble">'+replyCtx+media+(m.content?'<span>'+renderHTML(m.content)+'</span>':'')+picker+actions+'</div>'
    +buildReactionsHTML(m)+'</div>';
}
function buildReactionsHTML(m) {
  if(!m.reactions) return '';
  var pills=Object.entries(m.reactions).filter(function(x){ return x[1]&&x[1].length; }).map(function(x){
    return '<span class="rpill'+(x[1].includes(S.pseudo)?' me':'')+'" data-mid="'+m.id+'" data-emoji="'+x[0]+'" onclick="addReaction(this.dataset.mid,this.dataset.emoji,event)">'+x[0]+'<span class="rcnt">'+x[1].length+'</span></span>';
  }).join('');
  return pills ? '<div class="reactions">'+pills+'</div>' : '';
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
function init() {
  loading(true);
  SB = window.supabase.createClient(SB_URL, SB_KEY);
  SB.from('messages').select('id').limit(1).then(function(res){
    loading(false);
    if(res.error) showErr('joinErr','⚠ Erreur: '+res.error.message);
    else toast('✓ Connecté');
  }).catch(function(e){ loading(false); showErr('joinErr','⚠ Erreur: '+e.message); });
  $('pseudoIn').focus();
  setupMicButton();
}
document.addEventListener('click',function(e){
  document.querySelectorAll('.picker').forEach(function(p){ p.classList.add('hidden'); });
  if(!$('gifPanel').contains(e.target)&&e.target!==$('gifBtn')) closeGifPanel();
  if(!$('mentionPopup').contains(e.target)&&e.target!==$('msgInp')) hideMentionPopup();
});
window.addEventListener('beforeunload', stopTyping);
init();
</script>
