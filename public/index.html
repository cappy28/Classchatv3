<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ClassChat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Familjen+Grotesk:wght@400;600;700&display=swap');
:root{--bg:#080910;--s1:#0f1016;--s2:#161720;--s3:#1d1e2a;--border:#252636;--accent:#4ade80;--accent2:#86efac;--text:#e4e4f0;--muted:#5a5a72;--red:#f87171;--blue:#60a5fa;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 35% at 15% 5%,rgba(74,222,128,.06) 0%,transparent 60%),radial-gradient(ellipse 35% 25% at 85% 95%,rgba(96,165,250,.04) 0%,transparent 60%);pointer-events:none;z-index:0}
.screen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;transition:opacity .28s,transform .28s}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.97)}
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:34px 30px;width:min(430px,94vw);display:flex;flex-direction:column;gap:18px;box-shadow:0 0 50px rgba(74,222,128,.04),0 24px 48px rgba(0,0,0,.45)}
.logo{font-family:'Familjen Grotesk',sans-serif;font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.logo-pulse{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 10px var(--accent);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.card-title{font-family:'Familjen Grotesk',sans-serif;font-size:28px;font-weight:700;line-height:1.15}
.card-title em{color:var(--accent);font-style:normal}
.card-sub{font-size:11px;color:var(--muted);margin-top:-10px;letter-spacing:.4px}
.lbl{font-size:10px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
input[type=text]{background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:11px 13px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,222,128,.12)}
input::placeholder{color:var(--muted);font-size:12px}
.code-inp{font-size:24px!important;letter-spacing:10px;text-align:center;text-transform:uppercase}
.btn{background:var(--accent);border:none;border-radius:8px;color:#000;cursor:pointer;font-family:'Familjen Grotesk',sans-serif;font-size:14px;font-weight:700;padding:12px;transition:opacity .18s,transform .1s;width:100%}
.btn:hover{opacity:.88}.btn:active{transform:scale(.98)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:10px}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent2)}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:10px;letter-spacing:1px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.err{font-size:11px;color:var(--red);min-height:14px;opacity:0;transition:opacity .2s}
.err.show{opacity:1}
.sb-badge{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--accent2);display:flex;align-items:center;gap:6px}
.chat-wrap{width:min(580px,100vw);height:100dvh;display:flex;flex-direction:column;background:var(--s1);border-left:1px solid var(--border);border-right:1px solid var(--border);position:relative}
.chat-hdr{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:10px}
.room-badge{background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:13px;letter-spacing:3px;color:var(--accent);cursor:pointer}
.online{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.odot{width:6px;height:6px;background:var(--accent);border-radius:50%;box-shadow:0 0 6px var(--accent);animation:pulse 2s infinite}
.hdr-r{display:flex;gap:6px;align-items:center}
.ico{background:none;border:none;cursor:pointer;color:var(--muted);padding:6px;border-radius:6px;font-size:15px;transition:color .2s,background .2s;display:flex;align-items:center}
.ico:hover{color:var(--text);background:var(--s3)}
.ico.call-active{color:#4ade80;background:rgba(74,222,128,.15)}
.msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;flex-direction:column;max-width:80%;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.mine{align-self:flex-end;align-items:flex-end}
.msg.theirs{align-self:flex-start;align-items:flex-start}
.msg.system{align-self:center;max-width:100%}
.msg-meta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);margin-bottom:3px;padding:0 4px}
.bubble{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:8px 32px 8px 12px;font-size:13px;line-height:1.55;color:var(--text);position:relative;word-break:break-word}
.msg.mine .bubble{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.2)}
.msg.system .bubble{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 12px;border-radius:20px}
.msg-img{max-width:100%;max-height:280px;border-radius:8px;display:block;margin-top:4px;cursor:pointer;object-fit:cover}
.msg-gif{max-width:100%;max-height:240px;border-radius:8px;display:block;margin-top:4px;cursor:pointer}
.voice-bubble{display:flex;align-items:center;gap:10px;padding:4px 2px;min-width:200px}
.voice-play{background:var(--accent);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:15px}
.voice-wave{flex:1;height:28px;display:flex;align-items:center;gap:2px}
.voice-bar{width:3px;border-radius:2px;background:var(--muted)}
.voice-wave.playing .voice-bar{background:var(--accent);animation:waveAnim 1s ease-in-out infinite}
.voice-bar:nth-child(1){height:5px}.voice-bar:nth-child(2){height:12px;animation-delay:.08s}.voice-bar:nth-child(3){height:20px;animation-delay:.16s}.voice-bar:nth-child(4){height:10px;animation-delay:.24s}.voice-bar:nth-child(5){height:18px;animation-delay:.32s}.voice-bar:nth-child(6){height:7px;animation-delay:.4s}.voice-bar:nth-child(7){height:15px;animation-delay:.48s}.voice-bar:nth-child(8){height:9px;animation-delay:.56s}.voice-bar:nth-child(9){height:17px;animation-delay:.64s}.voice-bar:nth-child(10){height:6px;animation-delay:.72s}
@keyframes waveAnim{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.8)}}
.voice-duration{font-size:11px;color:var(--muted);flex-shrink:0}
.react-btn{position:absolute;top:50%;right:6px;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:12px;color:var(--muted);opacity:0;transition:opacity .15s;padding:2px 4px;border-radius:4px}
.bubble:hover .react-btn{opacity:1}
.picker{position:absolute;bottom:calc(100% + 6px);right:0;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:5px 7px;display:flex;gap:3px;box-shadow:0 8px 24px rgba(0,0,0,.55);z-index:20;white-space:nowrap}
.picker.hidden{display:none}
.emo{background:none;border:none;cursor:pointer;font-size:19px;padding:3px 4px;border-radius:6px;transition:transform .1s}
.emo:hover{transform:scale(1.2)}
.reactions{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.rpill{background:var(--s3);border:1px solid var(--border);border-radius:20px;padding:2px 7px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:3px;user-select:none}
.rpill.me{background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.35)}
.rcnt{font-size:10px;color:var(--muted)}
.typing-bar{height:26px;padding:0 18px;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);flex-shrink:0;transition:opacity .3s}
.typing-bar.empty{opacity:0}
.typing-dots{display:flex;gap:3px;align-items:center}
.typing-dots span{width:4px;height:4px;background:var(--accent);border-radius:50%;animation:tdot 1.2s ease-in-out infinite;opacity:.6}
.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.3);opacity:1}}
.call-panel{position:absolute;inset:0;background:rgba(8,9,16,.97);z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:20px;display:none}
.call-panel.show{display:flex}
.call-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;width:100%;max-width:520px;padding:0 16px;max-height:55vh;overflow-y:auto}
.call-tile{background:var(--s2);border:1px solid var(--border);border-radius:12px;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden}
.call-tile video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:12px}
.call-tile-name{font-size:11px;color:var(--muted);z-index:1;background:rgba(0,0,0,.5);padding:2px 8px;border-radius:10px}
.call-tile-ava{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#000}
.call-controls{display:flex;gap:12px;align-items:center}
.call-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:transform .1s}
.call-btn:active{transform:scale(.93)}
.call-btn.mute,.call-btn.cam,.call-btn.share{background:var(--s3);border:1px solid var(--border);color:var(--text)}
.call-btn.mute.on{background:rgba(248,113,113,.2);border-color:var(--red);color:var(--red)}
.call-btn.cam.off,.call-btn.share.on{background:rgba(96,165,250,.2);border-color:var(--blue);color:var(--blue)}
.call-btn.end{background:var(--red);color:#fff}
.call-info{font-size:13px;color:var(--muted)}
.call-incoming{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--accent);border-radius:20px;padding:24px 24px 20px;flex-direction:column;align-items:center;gap:14px;z-index:60;box-shadow:0 8px 40px rgba(74,222,128,.15);display:none;min-width:230px}
.call-incoming.show{display:flex;animation:incomingSlide .3s ease}
@keyframes incomingSlide{from{opacity:0;transform:translateX(-50%) translateY(-12px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
.call-incoming-title{font-size:13px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.call-incoming-sub{font-size:13px;color:var(--text);font-weight:600;margin-top:-6px}
.call-incoming-btns{display:flex;gap:12px;margin-top:4px}
.call-avatar-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:80px;height:80px}
.ring{position:absolute;border-radius:50%;border:2px solid rgba(74,222,128,.4);width:80px;height:80px;animation:ringPulse 2s ease-out infinite}
.ring:nth-child(2){animation-delay:.6s}.ring:nth-child(3){animation-delay:1.2s}
@keyframes ringPulse{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.2);opacity:0}}
.call-avatar{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#000;position:relative;z-index:1}
.ci-accept{background:var(--accent);border:none;border-radius:50%;color:#000;font-size:20px;width:48px;height:48px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ci-reject{background:var(--red);border:none;border-radius:50%;color:#fff;font-size:20px;width:48px;height:48px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.msgs.has-wp{background-size:cover;background-position:center}
.msgs.has-wp .bubble{background:rgba(15,16,22,.82);backdrop-filter:blur(6px)}
.msgs.has-wp .msg.mine .bubble{background:rgba(74,222,128,.18);backdrop-filter:blur(6px)}
.wp-panel{position:absolute;inset:0;background:var(--bg);z-index:40;flex-direction:column;display:none}
.wp-panel.show{display:flex}
.wp-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.wp-hdr h3{font-family:'Familjen Grotesk',sans-serif;font-size:16px;font-weight:700;flex:1}
.wp-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px}
.wp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 18px;overflow-y:auto}
.wp-item{border-radius:10px;aspect-ratio:9/16;cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .15s;display:flex;align-items:flex-end;justify-content:center;background-size:cover;background-position:center}
.wp-item:hover{transform:scale(1.04);border-color:var(--accent)}
.wp-item.sel{border-color:var(--accent);box-shadow:0 0 12px rgba(74,222,128,.4)}
.wp-lbl{font-size:10px;text-align:center;background:rgba(0,0,0,.6);color:#fff;width:100%;padding:5px;border-radius:0 0 8px 8px}
/* reply */
.reply-bar{display:none;padding:8px 18px;background:var(--s2);border-top:1px solid var(--border);align-items:center;gap:10px}
.reply-bar.show{display:flex}
.reply-preview{flex:1;border-left:3px solid var(--accent);padding:4px 10px;font-size:11px;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;border-radius:0 4px 4px 0;background:var(--s3)}
.reply-preview strong{color:var(--text);display:block;font-size:11px}
.reply-cancel{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;flex-shrink:0}
.msg-reply{background:var(--s3);border-left:3px solid var(--accent);padding:4px 10px;border-radius:0 6px 6px 0;font-size:11px;color:var(--muted);margin-bottom:5px;cursor:pointer}
.msg-reply strong{color:var(--text);font-size:11px;display:block}
/* edit */
.edit-overlay{display:none;position:absolute;bottom:100%;left:0;right:0;background:rgba(8,9,16,.96);border-top:1px solid rgba(251,191,36,.3);padding:12px 18px;align-items:center;gap:10px}
.edit-overlay.show{display:flex}
.edit-inp{flex:1;background:var(--s2);border:1px solid rgba(251,191,36,.4);border-radius:8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:8px 12px;outline:none}
.edit-inp:focus{border-color:#fbbf24}
.edit-save{background:#fbbf24;border:none;border-radius:8px;color:#000;font-weight:700;font-size:13px;padding:8px 14px;cursor:pointer;white-space:nowrap}
.edit-cancel{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px}
.msg-edited{font-size:9px;color:var(--muted);margin-left:4px;opacity:.7}
/* panic button */
.panic-btn{position:fixed;bottom:20px;left:20px;width:38px;height:38px;background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:500;transition:all .2s;opacity:.4}
.panic-btn:hover{opacity:1;background:rgba(248,113,113,.3);border-color:var(--red)}
/* game */
.game-panel{position:absolute;inset:0;background:var(--bg);z-index:45;flex-direction:column;display:none;overflow-y:auto}
.game-panel.show{display:flex}
.game-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.game-hdr h3{font-family:'Familjen Grotesk',sans-serif;font-size:16px;font-weight:700;flex:1}
.game-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px}
.game-body{padding:20px 18px;display:flex;flex-direction:column;gap:16px;flex:1}
.game-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px}
.game-title{font-family:'Familjen Grotesk',sans-serif;font-size:14px;font-weight:700}
.game-sub{font-size:11px;color:var(--muted)}
.game-input{background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 12px;outline:none;width:100%}
.game-input:focus{border-color:var(--accent)}
.game-btn{background:var(--accent);border:none;border-radius:8px;color:#000;font-family:'Familjen Grotesk',sans-serif;font-size:13px;font-weight:700;padding:10px;cursor:pointer;width:100%}
.game-btn:hover{opacity:.88}
.game-btn.red{background:var(--red);color:#fff}
.game-status{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:12px;line-height:1.6}
.game-img{width:100%;border-radius:10px;max-height:200px;object-fit:cover;border:1px solid var(--border)}
.game-players{display:flex;flex-direction:column;gap:6px}
.gp-item{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px}
.gp-vote{background:var(--red);border:none;border-radius:6px;color:#fff;font-size:11px;padding:4px 10px;cursor:pointer}
.gp-voted{opacity:.5;pointer-events:none}
.game-phase{font-size:11px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.game-turn{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);border-radius:8px;padding:10px 14px;font-size:12px;text-align:center}
.vote-results{display:flex;flex-direction:column;gap:6px}
.vote-bar-wrap{display:flex;align-items:center;gap:8px;font-size:12px}
.vote-bar{height:8px;background:var(--accent);border-radius:4px;transition:width .5s}
.impostor-reveal{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:10px;padding:14px;text-align:center;font-size:13px}
.inp-wrap{border-top:1px solid var(--border);flex-shrink:0;position:relative}
.rec-overlay{display:none;position:absolute;bottom:100%;left:0;right:0;background:rgba(8,9,16,.96);border-top:1px solid rgba(248,113,113,.3);padding:14px 18px;align-items:center;justify-content:space-between;gap:12px}
.rec-overlay.show{display:flex}
.rec-left{display:flex;align-items:center;gap:10px}
.rec-dot{width:10px;height:10px;background:var(--red);border-radius:50%;animation:recPulse 1s infinite}
@keyframes recPulse{0%,100%{opacity:1}50%{opacity:.3}}
.rec-time{font-size:16px;color:var(--red);font-weight:600;min-width:40px}
.rec-hint{font-size:11px;color:var(--muted)}
.rec-actions{display:flex;gap:8px}
.rec-cancel{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;padding:7px 12px;cursor:pointer}
.rec-send{background:var(--accent);border:none;border-radius:8px;color:#000;font-family:'Familjen Grotesk',sans-serif;font-size:13px;font-weight:700;padding:7px 14px;cursor:pointer}
.upload-preview{display:none;padding:8px 18px;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--s2)}
.upload-preview.show{display:flex}
.prev-item{position:relative;display:flex;align-items:center;gap:6px;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:5px 8px;max-width:200px}
.prev-item img{width:36px;height:36px;object-fit:cover;border-radius:4px;flex-shrink:0}
.prev-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;flex:1}
.prev-rm{background:none;border:none;cursor:pointer;color:var(--red);font-size:14px;padding:0 2px}
.upload-progress{height:3px;background:var(--border);display:none}
.upload-progress.show{display:block}
.progress-bar{height:100%;background:var(--accent);width:0%;transition:width .3s}
.inp-area{padding:10px 18px 13px;display:flex;gap:8px;align-items:flex-end}
.msg-inp{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 13px;outline:none;transition:border-color .2s;resize:none;max-height:100px;overflow-y:auto;line-height:1.5}
.msg-inp:focus{border-color:var(--accent)}
.attach-btn,.gif-btn,.mic-btn{background:var(--s2);border:1px solid var(--border);border-radius:10px;cursor:pointer;color:var(--muted);padding:9px 11px;font-size:15px;transition:color .2s,border-color .2s;display:flex;align-items:center;flex-shrink:0}
.attach-btn:hover{color:var(--accent);border-color:var(--accent)}
.gif-btn{font-family:'Familjen Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px}
.gif-btn:hover,.gif-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(74,222,128,.08)}
.mic-btn{font-size:16px;user-select:none;-webkit-user-select:none;touch-action:none}
.mic-btn.holding{color:var(--red);border-color:var(--red);background:rgba(248,113,113,.15)}
.send-btn{background:var(--accent);border:none;border-radius:10px;cursor:pointer;color:#000;padding:9px 14px;font-size:16px;font-weight:700;display:flex;align-items:center;flex-shrink:0}
.gif-panel{position:absolute;bottom:100%;left:0;right:0;background:var(--s1);border-top:1px solid var(--border);height:320px;flex-direction:column;z-index:30;display:none}
.gif-panel.show{display:flex}
.gif-search-wrap{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center}
.gif-search{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:8px 12px;outline:none}
.gif-search:focus{border-color:var(--accent)}
.gif-search::placeholder{color:var(--muted)}
.gif-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:4px}
.gif-grid{flex:1;overflow-y:auto;padding:10px 14px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.gif-item{border-radius:8px;overflow:hidden;cursor:pointer;aspect-ratio:1;background:var(--s3)}
.gif-item img{width:100%;height:100%;object-fit:cover}
.gif-loading{grid-column:1/-1;text-align:center;color:var(--muted);font-size:12px;padding:20px}
.upanel{position:absolute;top:50px;right:0;bottom:0;width:185px;background:var(--s2);border-left:1px solid var(--border);padding:14px 12px;display:flex;flex-direction:column;gap:7px;transform:translateX(100%);transition:transform .25s;z-index:10;overflow-y:auto}
.upanel.open{transform:translateX(0)}
.ptitle{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.uitem{display:flex;align-items:center;gap:7px;font-size:12px;padding:6px 8px;border-radius:6px;background:var(--s3);border:1px solid var(--border)}
.ava{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;flex-shrink:0}
body.mini .chat-wrap{position:fixed;bottom:16px;right:16px;width:325px;height:465px;border-radius:14px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.75)}
body.mini #chatScreen{align-items:flex-end;justify-content:flex-end;background:transparent}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.lightbox.show{opacity:1;pointer-events:all}
.lightbox-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 18px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.overlay{position:fixed;inset:0;background:rgba(8,9,16,.88);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>

let mediaRecorder=null,audioChunks=[],recInterval=null,recSeconds=0,isRecording=false;
function setupMicButton(){const btn=$('micBtn');btn.addEventListener('touchstart',e=>{e.preventDefault();startRecording();},{passive:false});btn.addEventListener('mousedown',e=>{e.preventDefault();startRecording();});}
async function startRecording(){if(isRecording)return;try{const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});isRecording=true;audioChunks=[];recSeconds=0;$('micBtn').classList.add('holding');const mimeType=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'].find(m=>MediaRecorder.isTypeSupported(m))||'';mediaRecorder=new MediaRecorder(stream,mimeType?{mimeType}:{});mediaRecorder.ondataavailable=e=>{if(e.data&&e.data.size>0)audioChunks.push(e.data);};mediaRecorder.onstop=()=>stream.getTracks().forEach(t=>t.stop());mediaRecorder.start(100);$('recOverlay').classList.add('show');recInterval=setInterval(()=>{recSeconds++;$('recTime').textContent=`${Math.floor(recSeconds/60)}:${(recSeconds%60).toString().padStart(2,'0')}`;},1000);window.toast('🎤 Appuie sur Envoyer quand tu as fini');}catch(e){isRecording=false;window.toast('⚠ Micro refusé',4000);}}
expose('_cancelRecording',()=>{clearInterval(recInterval);if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();mediaRecorder=null;audioChunks=[];isRecording=false;recSeconds=0;$('recOverlay').classList.remove('show');$('micBtn').classList.remove('holding');$('recTime').textContent='0:00';window.toast('Vocal annulé');});
expose('_sendRecording',async()=>{if(!mediaRecorder||!isRecording)return;clearInterval(recInterval);const duration=$('recTime').textContent;await new Promise(resolve=>{mediaRecorder.onstop=()=>{mediaRecorder.stream?.getTracks().forEach(t=>t.stop());resolve();};if(mediaRecorder.state!=='inactive')mediaRecorder.stop();else resolve();});$('recOverlay').classList.remove('show');$('micBtn').classList.remove('holding');isRecording=false;if(!audioChunks.length||recSeconds<1){window.toast('⚠ Vocal trop court');return;}const blob=new Blob(audioChunks,{type:mediaRecorder.mimeType||'audio/webm'});audioChunks=[];recSeconds=0;$('recTime').textContent='0:00';window.toast('⏫ Envoi vocal...',5000);try{const url=await uploadAudioToCloudinary(blob);await SB.from('messages').insert({room_code:S.code,type:'media',author:S.pseudo,color:S.color,content:'',reactions:{},file_url:url,file_name:`Vocal ${duration}`,file_size:blob.size,file_type:'audio'});window.toast('✓ Vocal envoyé ! 🎤');}catch(e){window.toast('⚠ '+e.message,5000);}});

expose('_rejectCall',()=>{$('callIncoming').classList.remove('show');window.toast('Appel refusé');});
async function joinLiveKit(withVideo){
  try{
    const{Room,RoomEvent,Track,createLocalTracks}=await import('https://cdn.jsdelivr.net/npm/livekit-client@2/+esm');
    const res=await fetch(`${TOKEN_API}?room=${S.code}&username=${encodeURIComponent(S.pseudo)}`);
    if(!res.ok)throw new Error('Token API '+res.status);
    const{token}=await res.json();
    lkRoom=new Room();
    lkRoom.on(RoomEvent.ParticipantConnected,p=>addCallTile(p));
    lkRoom.on(RoomEvent.ParticipantDisconnected,p=>removeCallTile(p.identity));
    lkRoom.on(RoomEvent.TrackSubscribed,(track,pub,participant)=>{const tile=document.querySelector(`[data-identity="${participant.identity}"]`);if(!tile)return;if(track.kind===Track.Kind.Video){const vid=track.attach();vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:12px';tile.appendChild(vid);}});
    lkRoom.on(RoomEvent.TrackUnsubscribed,track=>track.detach());
    await lkRoom.connect(LK_URL,token);
    localTracks=await createLocalTracks({audio:true,video:withVideo});
    for(const track of localTracks)await lkRoom.localParticipant.publishTrack(track);
    const tile=document.createElement('div');tile.className='call-tile';tile.dataset.identity='__local__';
    const ava=document.createElement('div');ava.className='call-tile-ava';ava.style.background=S.color;ava.textContent=S.pseudo[0].toUpperCase();
    const nm=document.createElement('div');nm.className='call-tile-name';nm.textContent='Toi';
    tile.appendChild(ava);tile.appendChild(nm);
    if(withVideo){const vt=localTracks.find(t=>t.kind==='video');if(vt){const el=vt.attach();el.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:12px';tile.appendChild(el);}}
    $('callGrid').appendChild(tile);
    $('callPanel').classList.add('show');$('audioCallBtn').classList.add('call-active');if(withVideo)$('videoCallBtn').classList.add('call-active');
    updateCallInfo();window.toast('✓ Connecté à l\'appel !');
  }catch(e){window.toast('⚠ Erreur appel : '+e.message,5000);lkRoom=null;}
}
function addCallTile(p){const g=$('callGrid');if(g.querySelector(`[data-identity="${p.identity}"]`))return;const t=document.createElement('div');t.className='call-tile';t.dataset.identity=p.identity;const c=COLORS[p.identity.charCodeAt(0)%COLORS.length];const a=document.createElement('div');a.className='call-tile-ava';a.style.background=c;a.textContent=p.identity[0].toUpperCase();const n=document.createElement('div');n.className='call-tile-name';n.textContent=p.identity;t.appendChild(a);t.appendChild(n);g.appendChild(t);updateCallInfo();}
function removeCallTile(id){document.querySelector(`[data-identity="${id}"]`)?.remove();updateCallInfo();}
function updateCallInfo(){const c=$('callGrid').children.length;$('callInfo').textContent=`${c} participant${c>1?'s':''} dans l'appel`;}
expose('_toggleMute',()=>{isMuted=!isMuted;localTracks.filter(t=>t.kind==='audio').forEach(t=>t.enabled=!isMuted);$('muteBtn').textContent=isMuted?'🔇':'🎙';$('muteBtn').classList.toggle('on',isMuted);});
expose('_toggleCam',()=>{isCamOff=!isCamOff;localTracks.filter(t=>t.kind==='video').forEach(t=>t.enabled=!isCamOff);$('camBtn').textContent=isCamOff?'🚫':'📹';$('camBtn').classList.toggle('off',isCamOff);});
expose('_toggleScreenShare',async()=>{if(!lkRoom){window.toast('Lance un appel d\'abord');return;}const btn=$('shareBtn');if(screenTrack){screenTrack.stop();try{await lkRoom.localParticipant.unpublishTrack(screenTrack);}catch{}screenTrack=null;btn.classList.remove('on');btn.textContent='🖥';window.toast('Partage arrêté');return;}try{const{LocalVideoTrack}=await import('https://cdn.jsdelivr.net/npm/livekit-client@2/+esm');const stream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:false});screenTrack=new LocalVideoTrack(stream.getVideoTracks()[0],undefined,false);await lkRoom.localParticipant.publishTrack(screenTrack,{source:'screen_share'});btn.classList.add('on');btn.textContent='⏹';stream.getVideoTracks()[0].onended=()=>window._toggleScreenShare();window.toast('✓ Partage d\'écran actif !');}catch(e){if(e.name!=='NotAllowedError')window.toast('⚠ '+e.message,4000);}});
expose('_endCall',async()=>{if(screenTrack){try{screenTrack.stop();await lkRoom?.localParticipant?.unpublishTrack(screenTrack);}catch{}screenTrack=null;}localTracks.forEach(t=>t.stop());localTracks=[];await lkRoom?.disconnect();lkRoom=null;isMuted=false;isCamOff=false;$('callPanel').classList.remove('show');$('callGrid').innerHTML='';$('audioCallBtn').classList.remove('call-active');$('videoCallBtn').classList.remove('call-active');$('muteBtn').textContent='🎙';$('camBtn').textContent='📹';$('shareBtn').textContent='🖥';window.toast('Appel terminé');});

const genCode=()=>{const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:5},()=>c[Math.floor(Math.random()*c.length)]).join('');};
async function getActivePseudos(code){const{data:j}=await SB.from('messages').select('author').eq('room_code',code).eq('type','system').ilike('content','% a rejoint %');const{data:l}=await SB.from('messages').select('author').eq('room_code',code).eq('type','system').ilike('content','% a quitté %');const active=new Set((j||[]).map(r=>r.author).filter(Boolean));(l||[]).forEach(r=>active.delete(r.author));return[...active];}

expose('_joinRoom',async()=>{
  const pseudo=$('pseudoIn').value.trim(),code=$('codeIn').value.trim().toUpperCase();
  if(!pseudo||pseudo.length<2)return showErr('joinErr','Pseudo trop court');
  if(!code||code.length<4)return showErr('joinErr','Code trop court');
  loading(true);
  const{data,error}=await SB.from('messages').select('id').eq('room_code',code).limit(1);
  if(error){loading(false);return showErr('joinErr','Erreur : '+error.message);}
  if(!data?.length){loading(false);return showErr('joinErr','Salle introuvable');}
  const actives=await getActivePseudos(code);
  const conflict=actives.find(p=>isSimilar(pseudo,p));
  loading(false);if(conflict)return showErr('joinErr',`Pseudo similaire à "${conflict}" déjà pris`);
  enter(pseudo,code);
});
expose('_createRoom',async()=>{
  const pseudo=$('pseudoIn').value.trim();
  if(!pseudo||pseudo.length<2)return showErr('joinErr','Entre ton pseudo d\'abord');
  const code=genCode();loading(true);
  const{error}=await SB.from('messages').insert({room_code:code,type:'system',content:`Salle créée par ${pseudo}`});
  loading(false);if(error)return showErr('joinErr','Erreur : '+error.message);
  enter(pseudo,code);window.toast(`Salle créée : ${code} 🎉`);
});

async function enter(pseudo,code){
  const color=rnd(COLORS);
  S.pseudo=pseudo;S.code=code;S.color=color;
  $('roomBadge').textContent=code;
  $('joinScreen').classList.add('hidden');$('chatScreen').classList.remove('hidden');$('msgInp').focus();
  await SB.from('messages').insert({room_code:code,type:'system',author:pseudo,content:`${pseudo} a rejoint la salle`});
  const{data}=await SB.from('messages').select('*').eq('room_code',code).order('created_at',{ascending:true});
  renderMsgs(data||[]);refreshOnline();
  S.sub=SB.channel('room-'+code).on('postgres_changes',{event:'*',schema:'public',table:'messages',filter:`room_code=eq.${code}`},p=>{
    if(p.eventType==='INSERT'){
      appendMsg(p.new);refreshOnline();
      if(p.new.type==='system'&&p.new.author!==S.pseudo&&p.new.content?.includes('a lancé un appel')){
        callType=p.new.content.includes('vidéo')?'video':'audio';
        const caller=p.new.author,c=COLORS[caller.charCodeAt(0)%COLORS.length];
        $('callIncomingText').textContent=`${caller} • appel ${callType}`;
        $('callAvatar').textContent=caller[0].toUpperCase();$('callAvatar').style.background=c;
        document.querySelectorAll('.ring').forEach(r=>r.style.borderColor=c+'66');
        $('callIncoming').classList.add('show');setTimeout(()=>$('callIncoming').classList.remove('show'),20000);
      }
    }
    if(p.eventType==='UPDATE'){
      updateReactions(p.new);
      // Also update content if edited
      if(p.new.edited){
        const el=document.querySelector(`[data-msgid="${p.new.id}"]`);
        if(el){const span=el.querySelector('.bubble > span');if(span)span.textContent=p.new.content;const meta=el.querySelector('.msg-meta');if(meta&&!meta.querySelector('.msg-edited')){const tag=document.createElement('span');tag.className='msg-edited';tag.textContent='modifié';meta.appendChild(tag);}}
      }
    }
  }).subscribe();
  S.typingSub=SB.channel('typing-'+code).on('postgres_changes',{event:'*',schema:'public',table:'typing',filter:`room_code=eq.${code}`},async()=>{const{data}=await SB.from('typing').select('author').eq('room_code',code);updateTypingBar((data||[]).map(r=>r.author));}).subscribe();
  setInterval(async()=>{const cutoff=new Date(Date.now()-5000).toISOString();await SB.from('typing').delete().eq('room_code',code).lt('updated_at',cutoff);},3000);
}

async function refreshOnline(){const a=await getActivePseudos(S.code);$('onlineTxt').textContent=`${a.length||1} en ligne`;$('usersList').innerHTML=a.map(n=>`<div class="uitem"><div class="ava" style="background:${COLORS[n.charCodeAt(0)%COLORS.length]}">${n[0].toUpperCase()}</div><span>${esc(n)}</span></div>`).join('');}

function renderPreviews(){const w=$('uploadPreview');if(!pendingFiles.length){w.classList.remove('show');return;}w.classList.add('show');w.innerHTML=pendingFiles.map((p,i)=>`<div class="prev-item">${p.previewUrl?`<img src="${p.previewUrl}">`:p.type==='video'?`<span style="font-size:20px">🎬</span>`:`<span style="font-size:20px">📄</span>`}<span class="prev-name">${esc(p.file.name)}</span><button class="prev-rm" onclick="removeFile(${i})">✕</button></div>`).join('');}

// ── SEND ──
expose('_sendMsg',async()=>{
  const inp=$('msgInp'),text=inp.value.trim();if(!text&&!pendingFiles.length)return;
  inp.value='';inp.style.height='auto';window._stopTyping();
  if(pendingFiles.length){
    const toUp=[...pendingFiles];pendingFiles=[];renderPreviews();$('uploadProgress').classList.add('show');
    for(let i=0;i<toUp.length;i++){const{file,type}=toUp[i];$('progressBar').style.width=Math.round(((i+.5)/toUp.length)*90)+'%';window.toast('⏫ Envoi...');try{let url='';if(type==='image')url=await uploadToImgbb(file);else{const ext=file.name.split('.').pop()||'bin',path=`${S.code}/${Date.now()}.${ext}`;const r=await fetch(`${SB_URL}/storage/v1/object/chat-files/${path}`,{method:'POST',headers:{'Authorization':`Bearer ${SB_KEY}`,'Content-Type':file.type||'application/octet-stream','x-upsert':'true'},body:file});if(!r.ok)throw new Error(await r.text());url=`${SB_URL}/storage/v1/object/public/chat-files/${path}`;}await SB.from('messages').insert({room_code:S.code,type:'media',author:S.pseudo,color:S.color,content:(i===toUp.length-1&&text)?text:'',reactions:{},file_url:url,file_name:file.name,file_size:file.size,file_type:type});window.toast('✓ Envoyé !');}catch(e){window.toast('⚠ '+e.message,4000);}}
    $('progressBar').style.width='100%';setTimeout(()=>{$('uploadProgress').classList.remove('show');$('progressBar').style.width='0%';},500);
  }else{
    const payload={room_code:S.code,type:'msg',author:S.pseudo,color:S.color,content:text,reactions:{}};
    if(replyTo){payload.reply_id=replyTo.id;payload.reply_author=replyTo.author;payload.reply_text=replyTo.text;}
    await SB.from('messages').insert(payload);
    if(replyTo)window._cancelReply();
  }
});

      <div class="game-card">
        <div class="game-title">🕵️ L'Imposteur</div>
        <div class="game-sub">Tout le monde voit la même image... sauf l'imposteur ! Posez-vous des questions à tour de rôle, puis votez pour trouver qui ment.</div>
      </div>
      <div class="game-card">
        <div class="game-title">Choisir le thème</div>
        <select class="game-input" id="themeSelect">
          ${Object.keys(THEMES).map(t=>`<option value="${t}">${t}</option>`).join('')}
        </select>
        <button class="game-btn" onclick="launchGame()">🚀 Lancer la partie</button>
      </div>`;
  } else if(inGame){
    renderGameActive();
  } else {
    body.innerHTML=`<div class="game-status">Une partie est en cours — rejoins en envoyant un message dans le chat d'abord !</div>`;
  }
}

expose('_launchGame',async()=>{
  const theme=document.getElementById('themeSelect').value;
  const imgs=THEMES[theme];
  await SB.from('messages').insert({
    room_code:S.code,type:'system',author:S.pseudo,
    content:`🎮 GAME_START|${theme}|${imgs.real}|${imgs.fake}|${S.pseudo}`
  });
});

function processGameMessage(content){
  if(content.startsWith('🎮 GAME_START|')){
    const parts=content.split('|');
    const [,theme,real,fake,host]=parts;
    game={active:true,phase:'lobby',theme,realImg:real,fakeImg:fake,players:{},impostorId:'',turnOrder:[],currentTurn:0,votes:{},myRole:''};
    game.players[S.pseudo]={joined:true};
    renderGameActive();
    window.toast('🎮 Partie lancée ! Rejoins en cliquant sur 🕵️');
  } else if(content.startsWith('🎮 GAME_JOIN|')){
    const pseudo=content.split('|')[1];
    if(!game.players[pseudo])game.players[pseudo]={joined:true};
    renderGameActive();
  } else if(content.startsWith('🎮 GAME_DEAL|')){
    // host assigns roles
    const data=JSON.parse(content.split('|').slice(1).join('|'));
    game.impostorId=data.impostor;
    game.turnOrder=data.order;
    game.phase='questions';
    game.currentTurn=0;
    game.myRole=S.pseudo===data.impostor?'impostor':'innocent';
    renderGameActive();
    window.toast(game.myRole==='impostor'?'👀 Tu es l'IMPOSTEUR !':'✅ Tu es innocent — trouve l'imposteur !',5000);
  } else if(content.startsWith('🎮 GAME_VOTE|')){
    const parts=content.split('|');
    game.votes[parts[1]]=parts[2];
    renderGameActive();
  } else if(content.startsWith('🎮 GAME_NEXT_TURN|')){
    game.currentTurn=parseInt(content.split('|')[1]);
    renderGameActive();
  } else if(content.startsWith('🎮 GAME_END')){
    game.phase='results';
    renderGameActive();
  }
}

function renderGameActive(){
  document.getElementById('gamePanel').classList.add('show');
  const body=document.getElementById('gameBody');
  const ph=document.getElementById('gamePhaseLabel');
  const players=Object.keys(game.players);
  const isMyTurn=game.turnOrder[game.currentTurn]===S.pseudo;

  if(game.phase==='lobby'){
    ph.textContent='EN ATTENTE';
    body.innerHTML=`
      <div class="game-status">🎮 Partie <strong>${game.theme}</strong> lancée !<br>Joueurs rejoints : ${players.join(', ')}</div>
      <div class="game-card">
        ${!game.players[S.pseudo]?`<button class="game-btn" onclick="joinGame()">👋 Rejoindre la partie</button>`:'<div style="color:var(--accent);font-size:13px">✓ Tu es dans la partie !</div>'}
        ${players.length>=2?`<button class="game-btn" onclick="dealRoles()" style="margin-top:8px">🃏 Distribuer les rôles (${players.length} joueurs)</button>`:'<div style="font-size:11px;color:var(--muted)">Attends au moins 2 joueurs...</div>'}
      </div>`;
  } else if(game.phase==='questions'){
    ph.textContent='QUESTIONS';
    const myImg=game.myRole==='impostor'?game.fakeImg:game.realImg;
    const currentPlayer=game.turnOrder[game.currentTurn]||'?';
    body.innerHTML=`
      <div class="game-card">
        <div class="game-title">Ton image (${game.myRole==='impostor'?'🎭 IMPOSTEUR':'✅ INNOCENT'})</div>
        <img class="game-img" src="${myImg}" onerror="this.src='https://picsum.photos/400/300?random=${Math.random()}'">
        <div style="font-size:11px;color:var(--muted)">Thème annoncé : <strong style="color:var(--text)">${game.theme}</strong></div>
      </div>
      <div class="game-turn">${isMyTurn?'👉 C'est TON tour de poser une question !':'⏳ C'est le tour de <strong>'+currentPlayer+'</strong>'}</div>
      <div class="game-card">
        <div class="game-title">Tour de parole</div>
        <div class="game-players">
          ${game.turnOrder.map((p,i)=>`<div class="gp-item" style="${i===game.currentTurn?'border-color:var(--accent)':''}"><span>${i===game.currentTurn?'👉 ':''}<strong>${p}</strong>${p===S.pseudo?' (toi)':''}</span>${i<game.currentTurn?'<span style="color:var(--accent)">✓</span>':''}</div>`).join('')}
        </div>
        ${isMyTurn?`<button class="game-btn" onclick="nextTurn()" style="margin-top:8px">✓ J'ai posé ma question →</button>`:''}
        <button class="game-btn red" onclick="startVote()" style="margin-top:8px">🗳 Passer au vote !</button>
      </div>`;
  } else if(game.phase==='vote'){
    ph.textContent='VOTE';
    const myVote=game.votes[S.pseudo];
    body.innerHTML=`
      <div class="game-status">🗳 Qui est l'imposteur ? Vote !</div>
      <div class="game-players">
        ${game.turnOrder.filter(p=>p!==S.pseudo).map(p=>`
          <div class="gp-item">
            <span><strong>${p}</strong></span>
            <button class="gp-vote ${myVote?'gp-voted':''}" onclick="castVote('${p}')">${myVote===p?'✓ Voté':'Voter'}</button>
          </div>`).join('')}
      </div>
      ${Object.keys(game.votes).length>0?`<div class="game-status">Votes : ${Object.keys(game.votes).length}/${game.turnOrder.length}</div>`:''}
      ${Object.keys(game.votes).length>=game.turnOrder.length?`<button class="game-btn" onclick="revealResults()">🔍 Révéler les résultats !</button>`:''}`;
  } else if(game.phase==='results'){
    ph.textContent='RÉSULTATS';
    const voteCount={};
    Object.values(game.votes).forEach(v=>{voteCount[v]=(voteCount[v]||0)+1;});
    const most=Object.entries(voteCount).sort((a,b)=>b[1]-a[1])[0];
    body.innerHTML=`
      <div class="impostor-reveal">
        <div style="font-size:32px">🎭</div>
        <div style="font-size:14px;margin:8px 0">L'imposteur était...</div>
        <div style="font-size:20px;font-weight:700;color:var(--red)">${game.impostorId}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:6px">${most?`Le groupe a voté pour ${most[0]} (${most[1]} votes)`:''}</div>
        <div style="font-size:13px;color:var(--accent);margin-top:8px">${most&&most[0]===game.impostorId?'✅ Le groupe a trouvé l'imposteur !':'❌ L'imposteur s'en est sorti !'}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="game-card"><div style="font-size:11px;color:var(--muted);margin-bottom:6px">Image innocents</div><img class="game-img" src="${game.realImg}"></div>
        <div class="game-card"><div style="font-size:11px;color:var(--muted);margin-bottom:6px">Image imposteur</div><img class="game-img" src="${game.fakeImg}"></div>
      </div>
      <button class="game-btn" onclick="resetGame()">🔄 Nouvelle partie</button>`;
  }
}

expose('_joinGame',async()=>{
  if(!game.active)return;
  game.players[S.pseudo]={joined:true};
  await SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:`🎮 GAME_JOIN|${S.pseudo}`});
  renderGameActive();
});

expose('_dealRoles',async()=>{
  const players=Object.keys(game.players);
  if(players.length<2)return window.toast('Il faut au moins 2 joueurs !');
  const impostor=players[Math.floor(Math.random()*players.length)];
  const order=[...players].sort(()=>Math.random()-.5);
  game.impostorId=impostor;game.turnOrder=order;game.phase='questions';game.currentTurn=0;
  game.myRole=S.pseudo===impostor?'impostor':'innocent';
  await SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:`🎮 GAME_DEAL|${JSON.stringify({impostor,order})}`});
  renderGameActive();
  window.toast(game.myRole==='impostor'?'👀 Tu es l'IMPOSTEUR !':'✅ Tu es innocent !',5000);
});

expose('_nextTurn',async()=>{
  const next=game.currentTurn+1;
  game.currentTurn=next;
  await SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:`🎮 GAME_NEXT_TURN|${next}`});
  renderGameActive();
});

expose('_startVote',async()=>{
  game.phase='vote';
  await SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:'🎮 GAME_END'});
  renderGameActive();
});

expose('_castVote',async(target)=>{
  if(game.votes[S.pseudo])return;
  game.votes[S.pseudo]=target;
  await SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:`🎮 GAME_VOTE|${S.pseudo}|${target}`});
  renderGameActive();
});

expose('_revealResults',()=>{game.phase='results';renderGameActive();});

expose('_resetGame',async()=>{
  game={active:false,phase:'lobby',theme:'',realImg:'',fakeImg:'',players:{},impostorId:'',turnOrder:[],currentTurn:0,votes:{},myRole:''};
  await SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:'🎮 GAME_RESET'});
  renderGameLobby();
});

// ── UI ──
expose('_leaveRoom',async()=>{await window._stopTyping();await window._endCall();await SB.from('messages').insert({room_code:S.code,type:'system',author:S.pseudo,content:`${S.pseudo} a quitté la salle`});if(S.sub)SB.removeChannel(S.sub);if(S.typingSub)SB.removeChannel(S.typingSub);S={pseudo:'',color:'',code:'',mini:false,sub:null,typingSub:null};pendingFiles=[];$('chatScreen').classList.add('hidden');$('joinScreen').classList.remove('hidden');$('codeIn').value='';$('msgs').innerHTML='';$('typingBar').classList.add('empty');document.body.classList.remove('mini');});
expose('_openLightbox',(url,isVid)=>{$('lightboxContent').innerHTML=isVid?`<video src="${url}" controls autoplay style="max-width:90vw;max-height:90vh;border-radius:8px"></video>`:`<img src="${url}" style="max-width:90vw;max-height:90vh;border-radius:8px">`;$('lightbox').classList.add('show');});
expose('_closeLightbox',()=>$('lightbox').classList.remove('show'));
expose('_copyCode',()=>navigator.clipboard.writeText(S.code).then(()=>window.toast('Code copié 📋')));
expose('_toggleMini',()=>{S.mini=!S.mini;document.body.classList.toggle('mini',S.mini);});
expose('_toggleUsers',()=>$('upanel').classList.toggle('open'));

// ── AUDIO PLAYER ──
let currentAudio=null;
expose('_playAudio',(btn,url)=>{if(currentAudio&&!currentAudio.paused){currentAudio.pause();document.querySelectorAll('.voice-wave').forEach(w=>w.classList.remove('playing'));document.querySelectorAll('.voice-play').forEach(b=>b.textContent='▶');if(currentAudio._url===url){currentAudio=null;return;}}const audio=new Audio(url);audio._url=url;currentAudio=audio;btn.textContent='⏸';btn.closest('.voice-bubble').querySelector('.voice-wave').classList.add('playing');audio.play().catch(()=>window.toast('⚠ Lecture impossible'));audio.onended=()=>{btn.textContent='▶';btn.closest('.voice-bubble')?.querySelector('.voice-wave')?.classList.remove('playing');currentAudio=null;};audio.onerror=()=>{btn.textContent='▶';window.toast('⚠ Erreur lecture');};});

// ── RENDER ──
function renderMsgs(msgs){const c=$('msgs');c.innerHTML=msgs.map(buildHTML).join('');c.scrollTop=c.scrollHeight;}
function appendMsg(m){const c=$('msgs');const ab=c.scrollHeight-c.scrollTop-c.clientHeight<80;c.insertAdjacentHTML('beforeend',buildHTML(m));if(ab)c.scrollTop=c.scrollHeight;}
function updateReactions(m){const el=document.querySelector(`[data-msgid="${m.id}"]`);if(!el)return;const old=el.querySelector('.reactions');const html=buildReactionsHTML(m);if(old)old.outerHTML=html||'<span></span>';else if(html)el.insertAdjacentHTML('beforeend',html);}
function buildHTML(m){
  if(m.type==='system'){
    if(m.content&&m.content.startsWith('🎮 '))processGameMessage(m.content);
    return`<div class="msg system"><div class="bubble">${m.content&&m.content.startsWith('🎮 GAME_')?'🎮 Événement de jeu reçu':esc(m.content)}</div></div>`;
  }
  const mine=m.author===S.pseudo,time=fmtT(m.created_at||Date.now()),color=m.color||COLORS[0];
  let media='';
  if(m.file_url){const ft=m.file_type||'file';if(ft==='audio'){const dur=m.file_name?.replace('Vocal ','')||'';media=`<div class="voice-bubble"><button class="voice-play" onclick="playAudio(this,'${m.file_url}')">▶</button><div class="voice-wave"><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span><span class="voice-bar"></span></div><span class="voice-duration">${dur}</span></div>`;}else if(ft==='gif')media=`<img class="msg-gif" src="${m.file_url}" onclick="openLightbox('${m.file_url}',false)">`;else if(ft==='image')media=`<img class="msg-img" src="${m.file_url}" loading="lazy" onclick="openLightbox('${m.file_url}',false)" onerror="this.outerHTML='<a href=\\'${m.file_url}\\' target=\\'_blank\\' style=\\'color:var(--accent)\\'>🖼 Voir</a>'">`;else if(ft==='video')media=`<video style="max-width:100%;max-height:240px;border-radius:8px;display:block;margin-top:4px" src="${m.file_url}" controls preload="metadata"></video>`;else{const icon=m.file_name?.endsWith('.pdf')?'📄':m.file_name?.endsWith('.zip')?'🗜️':'📎';media=`<a href="${m.file_url}" target="_blank" style="display:flex;align-items:center;gap:8px;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-top:4px;text-decoration:none;color:var(--text)"><span style="font-size:22px">${icon}</span><div style="display:flex;flex-direction:column;gap:2px"><span style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px">${esc(m.file_name||'fichier')}</span>${m.file_size?`<span style="font-size:10px;color:var(--muted)">${fmtSz(m.file_size)}</span>`:''}</div></a>`;}}
  const replyCtx=m.reply_id&&m.reply_author?`<div class="msg-reply" onclick="scrollToMsg('${m.reply_id}')"><strong>${esc(m.reply_author)}</strong>${esc((m.reply_text||'').slice(0,50))}</div>`:'';
  const editedTag=m.edited?`<span class="msg-edited">modifié</span>`:'';
  const picker=`<div class="picker hidden" data-id="${m.id}">${EMOJIS.map(e=>`<button class="emo" onclick="addReaction('${m.id}','${e}',event)">${e}</button>`).join('')}</div>`;
  const actions=`<div style="display:flex;gap:4px;position:absolute;top:4px;right:4px;opacity:0;transition:opacity .15s" class="msg-actions"><button onclick="startReply('${m.id}','${esc(m.author)}','${esc((m.content||'').replace(/'/g,'\''))}',event)" style="background:none;border:none;cursor:pointer;font-size:12px;color:var(--muted);padding:2px 4px;border-radius:4px" title="Répondre">↩</button>${mine?`<button onclick="startEdit('${m.id}','${esc((m.content||'').replace(/'/g,'\''))}',event)" style="background:none;border:none;cursor:pointer;font-size:12px;color:var(--muted);padding:2px 4px;border-radius:4px" title="Modifier">✏️</button>`:''}`;
  return`<div class="msg ${mine?'mine':'theirs'}" data-msgid="${m.id}"><div class="msg-meta">${!mine?`<span style="color:${color};font-weight:600">${esc(m.author)}</span>`:''}<span>${time}</span>${editedTag}</div><div class="bubble" style="position:relative" onmouseenter="this.querySelector('.msg-actions').style.opacity=1" onmouseleave="this.querySelector('.msg-actions').style.opacity=0">${replyCtx}${media}${m.content?`<span>${esc(m.content)}</span>`:''}<button class="react-btn" onclick="togglePicker('${m.id}',event)" style="right:28px">＋</button>${picker}${actions}</div></div>${buildReactionsHTML(m)}</div>`;
}
function buildReactionsHTML(m){if(!m.reactions)return'';const pills=Object.entries(m.reactions).filter(([,u])=>u?.length).map(([e,u])=>`<span class="rpill ${u.includes(S.pseudo)?'me':''}" onclick="addReaction('${m.id}','${e}',event)">${e}<span class="rcnt">${u.length}</span></span>`).join('');return pills?`<div class="reactions">${pills}</div>`:'';}

// ── INIT ──
async function init(){
  loading(true);
  try{
    const{createClient}=await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
    SB=createClient(SB_URL,SB_KEY);
    const{error}=await SB.from('messages').select('id').limit(1);
    if(error)throw new Error(error.message);
    loading(false);window.toast('✓ Connecté');
  }catch(e){loading(false);showErr('joinErr','⚠ Erreur : '+e.message);}
  $('pseudoIn').focus();
  setupMicButton();
}

document.addEventListener('click',e=>{document.querySelectorAll('.picker').forEach(p=>p.classList.add('hidden'));if(!$('gifPanel').contains(e.target)&&e.target!==$('gifBtn'))window._closeGifPanel();});
window.addEventListener('beforeunload',()=>window._stopTyping());
init();
</script>
