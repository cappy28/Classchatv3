<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ClassChat — Cérémonie 🎰</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--acc:#8b7cf8;--acc2:#a78bfa;--gold:#f2cc6e;--gold2:#d4a843;--bg:#05040d}
body{background:var(--bg);color:#fff;font-family:'Nunito',sans-serif;min-height:100dvh;overflow-x:hidden;overflow-y:auto}

/* ANIMATED BG */
.bg-anim{position:fixed;inset:0;z-0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbMove var(--d,10s) ease-in-out infinite alternate}
@keyframes orbMove{from{transform:translate(0,0)}to{transform:translate(var(--tx,30px),var(--ty,30px))}}

/* CONFETTI */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden}
.conf{position:absolute;width:8px;height:8px;border-radius:2px;animation:confFall var(--dur,3s) linear var(--delay,0s) forwards}
@keyframes confFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* SECTIONS */
.section{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:20px;text-align:center;position:relative;z-index:1}
.section.active{display:flex}

/* INTRO */
#secIntro .intro-logo{font-size:80px;animation:float 2s ease-in-out infinite;filter:drop-shadow(0 0 30px rgba(212,168,67,.6))}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
#secIntro h1{font-size:36px;font-weight:900;line-height:1.1;margin:20px 0 10px;background:linear-gradient(135deg,#fff,var(--gold),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#secIntro .intro-sub{font-size:16px;color:rgba(255,255,255,.6);margin-bottom:30px}
.countdown-big{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:280px;width:100%;margin-bottom:30px}
.cdb-item{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px 8px}
.cdb-num{font-size:40px;font-weight:900;color:#fff;line-height:1}
.cdb-unit{font-size:10px;color:rgba(255,255,255,.4);font-weight:800;letter-spacing:1px}
.pulse-btn{padding:16px 32px;border-radius:16px;background:linear-gradient(110deg,var(--gold2),var(--gold));border:none;color:#07060c;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;animation:pulseShadow 2s ease-in-out infinite}
@keyframes pulseShadow{0%,100%{box-shadow:0 0 20px rgba(212,168,67,.4)}50%{box-shadow:0 0 50px rgba(212,168,67,.7)}}

/* WHEEL */
#secWheel{gap:16px}
.wheel-title{font-size:24px;font-weight:900;color:var(--gold);margin-bottom:4px}
.wheel-sub{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:16px}
.wheel-container{position:relative;width:320px;height:320px;margin:0 auto}
#wheelCanvas{border-radius:50%;box-shadow:0 0 60px rgba(139,124,248,.4)}
.wheel-pointer{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:32px;z-index:10;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.wheel-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;border-radius:50%;background:var(--bg);border:3px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;z-index:5}
.spin-btn{margin-top:20px;padding:16px 40px;border-radius:16px;background:linear-gradient(110deg,var(--acc),var(--acc2));border:none;color:#fff;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 4px 24px rgba(139,124,248,.4);transition:transform .2s}
.spin-btn:hover{transform:scale(1.05)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.round-indicator{font-size:13px;color:rgba(255,255,255,.4);font-weight:700}

/* WINNER REVEAL */
#secWinner{gap:20px}
.winner-explosion{font-size:80px;animation:explode .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes explode{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
.winner-rank{font-size:14px;font-weight:900;color:var(--gold);letter-spacing:2px}
.winner-avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:40px;border:3px solid var(--gold);box-shadow:0 0 40px rgba(212,168,67,.4);animation:avatarGlow 2s ease-in-out infinite}
@keyframes avatarGlow{0%,100%{box-shadow:0 0 40px rgba(212,168,67,.3)}50%{box-shadow:0 0 80px rgba(212,168,67,.7)}}
.winner-pseudo{font-size:32px;font-weight:900;color:#fff;margin:10px 0 4px}
.winner-prize{font-size:16px;color:var(--gold);font-weight:800}
.winner-next-btn{margin-top:16px;padding:14px 28px;border-radius:14px;background:linear-gradient(110deg,var(--acc),var(--acc2));border:none;color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 4px 24px rgba(139,124,248,.3)}

/* PODIUM */
#secPodium{gap:16px;padding:30px 20px}
.podium-title{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.podium-sub{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:20px}
.podium-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:380px;align-items:end;margin-bottom:24px}
.podium-item{display:flex;flex-direction:column;align-items:center;gap:8px}
.podium-avatar{border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;border:2px solid rgba(255,255,255,.2)}
.podium-name{font-size:12px;font-weight:900;text-align:center;word-break:break-all}
.podium-block{width:100%;border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid rgba(255,255,255,.1)}
.podium-item.p1 .podium-avatar{width:64px;height:64px;font-size:24px;border-color:var(--gold)}
.podium-item.p2 .podium-avatar{width:52px;height:52px;font-size:18px}
.podium-item.p3 .podium-avatar{width:44px;height:44px;font-size:16px}
.podium-item.p1 .podium-block{height:100px;background:linear-gradient(180deg,rgba(212,168,67,.2),rgba(212,168,67,.05));border-color:rgba(212,168,67,.3)}
.podium-item.p2 .podium-block{height:70px;background:rgba(192,192,192,.1)}
.podium-item.p3 .podium-block{height:50px;background:rgba(176,141,87,.1)}
.fireworks{font-size:48px;animation:bounce 1s ease-in-out infinite alternate}
@keyframes bounce{from{transform:scale(1)}to{transform:scale(1.1)}}
.share-win-btn{padding:14px 28px;border-radius:14px;background:linear-gradient(110deg,var(--gold2),var(--gold));border:none;color:#07060c;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer}
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg-anim">
  <div class="orb" style="width:400px;height:400px;background:rgba(139,124,248,.15);top:-100px;left:-100px;--d:12s;--tx:60px;--ty:40px"></div>
  <div class="orb" style="width:300px;height:300px;background:rgba(212,168,67,.1);bottom:-50px;right:-50px;--d:9s;--tx:-40px;--ty:-30px"></div>
  <div class="orb" style="width:200px;height:200px;background:rgba(244,114,182,.1);top:50%;right:10%;--d:15s;--tx:20px;--ty:-50px"></div>
</div>

<!-- Confetti container -->
<div class="confetti-container" id="confettiContainer"></div>

<!-- SECTION 1 : INTRO / ATTENTE -->
<div class="section active" id="secIntro">
  <div class="intro-logo">🏆</div>
  <h1>Cérémonie ClassChat<br>Jeu Concours</h1>
  <div class="intro-sub" id="introSub">La cérémonie commence bientôt...</div>
  <div class="countdown-big" id="cdbGrid" style="grid-template-columns:repeat(4,1fr);max-width:360px">
    <div class="cdb-item"><div class="cdb-num" id="cdbJ">--</div><div class="cdb-unit">JOURS</div></div>
    <div class="cdb-item"><div class="cdb-num" id="cdbH">--</div><div class="cdb-unit">HEURES</div></div>
    <div class="cdb-item"><div class="cdb-num" id="cdbM">--</div><div class="cdb-unit">MIN</div></div>
    <div class="cdb-item"><div class="cdb-num" id="cdbS">--</div><div class="cdb-unit">SEC</div></div>
  </div>
  <div style="font-size:13px;color:rgba(255,255,255,.4);font-weight:700;margin-top:4px"><span id="cdbP">0</span> inscrits validés</div>
  <button class="pulse-btn" id="startBtn" onclick="startCeremony()" style="display:none">
    🎰 Lancer la cérémonie !
  </button>
</div>

<!-- SECTION 2 : ROUE -->
<div class="section" id="secWheel">
  <div class="wheel-title">🎰 Tirage au sort</div>
  <div class="wheel-sub" id="wheelSub">Tour 1 sur 3</div>
  <div class="wheel-container">
    <div class="wheel-pointer">▼</div>
    <canvas id="wheelCanvas" width="320" height="320"></canvas>
    <div class="wheel-center">🎲</div>
  </div>
  <div class="round-indicator" id="roundIndicator">Gagnants trouvés : 0/3</div>
  <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🎰 Tourner la roue !</button>
</div>

<!-- SECTION 3 : GAGNANT -->
<div class="section" id="secWinner">
  <div class="winner-explosion" id="winnerEmoji">🎉</div>
  <div class="winner-rank" id="winnerRank">GAGNANT N°1</div>
  <div class="winner-avatar" id="winnerAvatar">?</div>
  <div class="winner-pseudo" id="winnerPseudo">Pseudo</div>
  <div class="winner-prize">🏆 1 semaine Premium offerte !</div>
  <button class="winner-next-btn" id="winnerNextBtn" onclick="nextRound()">Prochain tirage →</button>
</div>

<!-- SECTION 4 : PODIUM FINAL -->
<div class="section" id="secPodium">
  <div class="fireworks">🎆</div>
  <div class="podium-title">Les Gagnants !</div>
  <div class="podium-sub">Félicitations à tous les participants 🎊</div>
  <div class="podium-grid" id="podiumGrid"></div>
  <button class="share-win-btn" onclick="window.location='/concours'">🔙 Retour au concours</button>
</div>

<script>
var SB_URL = 'https://ersxfcqumaftjucrqjwj.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyc3hmY3F1bWFmdGp1Y3JxandqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDg3NDIsImV4cCI6MjA4ODIyNDc0Mn0.CO_x6t-VyoZ9q2lMRMI7JFuBdTZl_axGpgLcB6POFTE';

var CEREMONY_TIME = new Date('2026-03-18T18:30:00');
var ADMIN_CODE = 'lucasvyp6';

var _participants = [];
var _winners = [];
var _currentRound = 0;
var _spinning = false;
var _angle = 0;
var _animId = null;

// Countdown to ceremony
function updateIntroCd(){
  var now = new Date();
  var diff = CEREMONY_TIME - now;
  if(diff <= 0){
    document.getElementById('cdbGrid').style.display='none';
    document.getElementById('introSub').textContent = 'La cérémonie est prête !';
    var isAdmin = new URLSearchParams(location.search).get('admin') === ADMIN_CODE;
    if(isAdmin) document.getElementById('startBtn').style.display='block';
    else document.getElementById('introSub').textContent = "En attente du lancement par l admin...";
    return;
  }
  var j = Math.floor(diff/86400000);
  var hh = Math.floor((diff%86400000)/3600000);
  var m = Math.floor((diff%3600000)/60000);
  var s = Math.floor((diff%60000)/1000);
  var set = function(id,v){ var el=document.getElementById(id); if(el) el.textContent=String(v).padStart(2,'0'); };
  set('cdbJ',j); set('cdbH',hh); set('cdbM',m); set('cdbS',s);
}
updateIntroCd();
setInterval(updateIntroCd, 1000);

// Load participants
async function loadParticipants(){
  try{
    var r = await fetch(SB_URL+'/rest/v1/concours_inscriptions?status=eq.validated&select=id,pseudo,avatar_url', {
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    _participants = await r.json();
    if(!Array.isArray(_participants)) _participants = [];
    var el = document.getElementById('cdbP');
    if(el) el.textContent = _participants.length;
    drawWheel();
  }catch(e){
    console.error('Erreur chargement participants:', e);
    _participants = [];
    drawWheel();
  }
}
loadParticipants();

// Show section
function showSection(id){
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}

// Start ceremony
function startCeremony(){
  showSection('secWheel');
  playIntroSound();
  setTimeout(function(){ drawWheel(); }, 100);
}

// Draw wheel
function drawWheel(){
  var canvas = document.getElementById('wheelCanvas');
  var ctx = canvas.getContext('2d');
  var available = _participants.filter(function(p){ return !_winners.find(function(w){return w.pseudo===p.pseudo;}); });
  if(!available.length) return;
  var N = available.length;
  var colors = ['#8b7cf8','#a78bfa','#6d4ff6','#7c3aed','#9333ea','#8b5cf6','#7c67f8','#b197fc','#845ef7','#9c67fa'];
  var arc = (2*Math.PI)/N;
  ctx.clearRect(0,0,320,320);
  for(var i=0;i<N;i++){
    ctx.beginPath();
    ctx.moveTo(160,160);
    ctx.arc(160,160,155,_angle+i*arc,_angle+(i+1)*arc);
    ctx.closePath();
    ctx.fillStyle = colors[i%colors.length];
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.15)';
    ctx.lineWidth=1;
    ctx.stroke();
    // Label
    ctx.save();
    ctx.translate(160,160);
    ctx.rotate(_angle+i*arc+arc/2);
    ctx.textAlign='right';
    ctx.fillStyle='#fff';
    ctx.font='bold '+(N>10?9:11)+'px Nunito';
    var label = available[i].pseudo;
    if(label.length>10) label=label.substring(0,9)+'…';
    ctx.fillText(label,140,4);
    ctx.restore();
  }
  // Center circle
  ctx.beginPath();
  ctx.arc(160,160,24,0,2*Math.PI);
  ctx.fillStyle='#05040d';
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.2)';
  ctx.lineWidth=2;
  ctx.stroke();
}

// Spin wheel
function spinWheel(){
  if(_spinning) return;
  _spinning = true;
  document.getElementById('spinBtn').disabled=true;
  var available = _participants.filter(function(p){ return !_winners.find(function(w){return w.pseudo===p.pseudo;}); });
  if(!available.length) return;

  // Pick winner
  var winnerIdx = Math.floor(Math.random()*available.length);
  var winner = available[winnerIdx];

  // Calculate target angle
  var N = available.length;
  var arc = (2*Math.PI)/N;
  var targetAngle = -(winnerIdx*arc + arc/2) + Math.PI/2;
  var fullSpins = (8 + Math.floor(Math.random()*6)) * 2 * Math.PI;
  var targetTotal = _angle + fullSpins + (targetAngle - (_angle % (2*Math.PI)));

  var startAngle = _angle;
  var startTime = null;
  var duration = 4000 + Math.random()*2000;

  function animate(ts){
    if(!startTime) startTime=ts;
    var progress = (ts-startTime)/duration;
    if(progress>=1){
      _angle = targetTotal % (2*Math.PI);
      drawWheel();
      _spinning=false;
      setTimeout(function(){ showWinner(winner, _winners.length+1); }, 500);
      return;
    }
    // Ease out cubic
    var ease = 1-Math.pow(1-progress,3);
    _angle = startAngle + (targetTotal-startAngle)*ease;
    drawWheel();
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
  playSpinSound();
}

// Show winner
function showWinner(winner, round){
  _winners.push(winner);
  showSection('secWinner');
  launchConfetti();

  var emojis = ['🥇','🥈','🥉'];
  var labels = ['GAGNANT N°1 🥇','GAGNANT N°2 🥈','GAGNANT N°3 🥉'];
  document.getElementById('winnerEmoji').textContent = emojis[round-1]||'🏆';
  document.getElementById('winnerRank').textContent = labels[round-1]||'GAGNANT';
  document.getElementById('winnerPseudo').textContent = winner.pseudo;

  var av = document.getElementById('winnerAvatar');
  if(winner.avatar_url){
    av.innerHTML='<img src="'+winner.avatar_url+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
  } else {
    av.textContent = winner.pseudo[0].toUpperCase();
  }

  var nextBtn = document.getElementById('winnerNextBtn');
  if(_winners.length >= 3){
    nextBtn.textContent = '🏆 Voir le podium final !';
  } else {
    nextBtn.textContent = 'Prochain tirage →';
  }

  document.getElementById('roundIndicator').textContent = 'Gagnants trouvés : '+_winners.length+'/3';
  document.getElementById('wheelSub').textContent = 'Tour '+Math.min(_winners.length+1,3)+' sur 3';
  document.getElementById('winnerNextBtn').style.display='block';
}

// Next round
function nextRound(){
  if(_winners.length >= 3){
    showPodium();
  } else {
    showSection('secWheel');
    document.getElementById('spinBtn').disabled=false;
    drawWheel();
  }
}

// Show podium
function showPodium(){
  showSection('secPodium');
  launchConfetti();
  launchConfetti();

  var order = [_winners[1]||{pseudo:'?'},_winners[0]||{pseudo:'?'},_winners[2]||{pseudo:'?'}];
  var classes = ['p2','p1','p3'];
  var ranks = ['🥈','🥇','🥉'];
  var blocks = [70,100,50];

  var grid = document.getElementById('podiumGrid');
  grid.innerHTML = order.map(function(w,i){
    return '<div class="podium-item '+classes[i]+'">'
      +'<div class="podium-avatar" style="width:'+(i===1?64:i===0?52:44)+'px;height:'+(i===1?64:i===0?52:44)+'px;font-size:'+(i===1?24:18)+'px">'
      +(w.avatar_url?'<img src="'+w.avatar_url+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">':w.pseudo[0].toUpperCase())
      +'</div>'
      +'<div class="podium-name">'+w.pseudo+'</div>'
      +'<div class="podium-block" style="height:'+blocks[i]+'px">'+ranks[i]+'</div>'
      +'</div>';
  }).join('');
}

// Confetti
function launchConfetti(){
  var container = document.getElementById('confettiContainer');
  var colors = ['#8b7cf8','#f2cc6e','#f472b6','#34d399','#60a5fa','#fb923c'];
  for(var i=0;i<80;i++){
    var el=document.createElement('div');
    el.className='conf';
    el.style.cssText='left:'+Math.random()*100+'%;background:'+colors[Math.floor(Math.random()*colors.length)]+';--dur:'+(2+Math.random()*3)+'s;--delay:'+(Math.random()*2)+'s;width:'+(4+Math.random()*8)+'px;height:'+(4+Math.random()*8)+'px;border-radius:'+(Math.random()>0.5?'50%':'2px');
    container.appendChild(el);
    setTimeout(function(e){ e.remove(); },(5000), el);
  }
}

// Sounds (Web Audio API)
var _audioCtx = null;
function getAudio(){ if(!_audioCtx) _audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return _audioCtx; }

function playTone(freq, dur, type){
  try{
    var ctx=getAudio();
    var o=ctx.createOscillator();
    var g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type||'sine';o.frequency.value=freq;
    g.gain.setValueAtTime(.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start();o.stop(ctx.currentTime+dur);
  }catch(e){}
}

function playIntroSound(){
  [261,329,392,523].forEach(function(f,i){ setTimeout(function(){playTone(f,.3,'triangle');},i*200); });
}

function playSpinSound(){
  var interval=setInterval(function(){playTone(200+Math.random()*400,.05,'square');},80);
  setTimeout(function(){clearInterval(interval);},4500);
  setTimeout(function(){
    [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){playTone(f,.4,'sine');},i*150); });
  },4600);
}
</script>
</body>
</html>
